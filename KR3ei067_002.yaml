body:
  text: 高氏胎産方案卷二臨産總論産子又名分娩婦人以血為主血和則氣順氣順而産亦順奈富貴之家居尊養優耽於安樂全不運動使精血凝於胞胎氣不流通抑或臨産驚恐穩婆冒昧坐草太早逮産母困倦無力送兒以致難産即如腹痛或作或止名曰弄胎漿水點滴微來名曰試水此時兒方轉身切莫倉皇並禁穩婆將手人探腹上揣摩直至腰痛如折眼中火出水破淋漓兒逼産門方可坐草用力送之小孩自來而猶遲遲末下者始服催生之藥然又不可輕用峻劑徒滲水道愈令難産時逢盛暑氣散血沸産室宜水缸以收熱毒節屆嚴冬氣滯血凝産室宜備火盆以解寒邪此調護之法當因時以制宜也臨産脈法欲産之脈散而離經脈一呼三至曰離經是陽加於陰一部也一呼一至亦曰離經是陰加於陰一部也蓋由胎動於中是以脈亂於外故能知其欲産沉細而滑不日分娩沉細而滑乃腎臟本脈之形腎系胞胎故見此脈者亦與離經同也楊子建十二産難論一曰正産懷胎十月陰陽氣足忽然作陳疼痛胎至産門漿破胎下兒即正産二曰傷産胎未足月有所傷動以致忽然臍腹疼痛或服催生藥太早或産母用力太過逼兒錯路以致不能正生故分娩須待兒身轉動頭對産門然後努力一送自然産下三曰催生欲産時兒頭已至産門而生猶遲滯者方用藥催之又或挨延日久産母困倦難支宜服藥以助其氣血令兒速生四曰凍産天氣寒冷産母氣血凝滯不能速生務要産室和暖衣被加厚使産母溫和不致血凝胎滯五曰熱産暑天産母熱甚則頭痛面赤昏暈或産室人多氣逼亦致此患名曰暈宜多置水盆以收熱毒庶免崩暈然或遇涼風陰雨又當謹避六曰橫生此由兒方轉身産母努力逼之以致兒頭不正當令産母安然仰臥推兒身正直撥頭對産門推撥時以中指深兒肩不令臍帶系絆方用藥催之繼以努力一送兒即生矣催生保母飲葵子三錢天葵阿膠四錢當歸三錢川芎二錢滑石三錢上五味共為末紹酒蜂蜜調服古用三脫散蜜調服三脫散方見本卷集催生諸方門七曰倒生由兒尚未掉頭努力一逼故也亦令安然仰臥令穩婆徐徐將兒足推送入腹候兒身自順切勿驚惶如良久不生信穩婆輕輕用手推足就令一邊漸漸順下正對産門然後服催生藥努力一送即生矣八曰偏生由兒頭未順生路産母努力一逼以致兒頭偏墜一邊雖已露頂實乃頭角也亦當令仰臥輕輕用手撥正小兒頭面直對産門一送即下若兒頭頂後骨偏墜穀道而先露頭則令穩婆以綿衣烘暖裹手於穀道外旁轉手推兒努力送之自生名曰側生九曰遺宗嶽按第八段自若兒頭頂後骨一句至段末即第九段十曰坐産言兒欲生時當於高處牢挂手巾一條令産母以手攀之輕輕屈足良久兒即順生十一曰盤腸生臨産時小腸先出然後生兒其腸不收名曰盤腸急以熱水浸軟舊布蓋住其腸不可包托外以醋半盞新汲水半盞默噀産母背面一噴令一縮再噴再縮以盡為度不可驚惶可用如聖膏塗頂心收盡即洗去或以半夏末吹鼻即收或以麻油紙煙熏鼻或用磨刀水少許火上溫過以潤其腸後用好磁石即吸鐵石煎湯一盞服之自收蓋用磨刀水之故即以借其勢如腸久出而風吹乾不能收者用淨器盛貯煎黃耆湯浸之如聖膏又名收線子母膏見産後奇異症門又見胎衣不下門十二曰交骨不開陰門不閉二症皆由元氣素弱胎前失於調攝以致氣血不能運達而然交骨不開者陰氣虛加味芎歸湯陰門不閉者氣血兩虛也用十全大補湯加味芎歸湯龜板一兩川芎二錢當歸四錢十全大補湯人參白朮茯苓甘草當歸川芎熟地白芍陳皮半夏各等份將産昏倒凡將産忽然昏倒或坐草之時驀然口噤目翻吐沫者皆因産前不能忌口恣食肥甘以致五臟氣滯六腑不和且胎氣既肥用力太早遂令胎驚猝倒治以瘦胎金腋丸可保無憂矣瘦胎金腋丸公母羊糞各二錢五燒存性飛生毛腋下者燒存性人發各五錢無病者燒存性揀砂仁五分生研黑鉛水銀灶心土各一錢共八味先將後四味入鍋內溶化拌勻取出研碎再與前四味共為末用江米粽子角不論多少搗和為丸如緑豆大遇前症及橫生倒産以急流水吞下五丸則子母俱保交骨不開凡將産真陰枯滯或中年破腹交骨不開以致難産者宜服開骨千金不易湯開骨千金不易湯敗龜板三錢醋炙研人頭髮一錢燒存性川芎三錢全當歸六錢紹酒一盞此方初産婦人更宜服方中用發以無泥垢者為嘉其發不拘男女皆可用死胎不下並雙胎一死一生凡胎死腹中外現指甲青黑脹悶不食口中極臭用平胃散加朴硝五錢水酒煎服其胎化成血水而下如血乾而寒者芎歸湯下或服桂香丸或服立竿見影方雙胎服蟹爪湯加硝平胃散蒼朮炒川朴炒陳皮甘草各一錢朴硝五錢紹酒一兩芎歸湯即佛手散見集催生諸方門桂香丸邊桂三錢麝香一分蜂蜜為丸桐子大白水送下立竿見影方黃葵花三錢牡丹皮三分真蕪荑茶三分麝香一分蠶半個巴豆半粒去油萆麻子半粒去油大黃一錢研末上八味用前七味共為末醋糊為丸彈子大大黃為衣臨用研碎一丸熱紹酒和芝麻油少許送下按此方用蔥汁糊為丸更妙此方活水瘦胎軟骨一切橫生逆産死胎立下蟹爪湯蟹爪一兩甘草二兩生東流水十盞煎至三盞去渣人阿膠三兩研末沖此藥作三次頓服每服一次相隔一小時上方專治一婦孕雙胎一死一活者用此方一劑能令活者安死者出胎衣不下凡胎衣不下由産母困倦無力送胎衣或停滯已久外乘冷氣凝滯血道或胎前素弱血氣枯涸而衣遂傳留三者俱速煎生化湯大料進之血旺復和衣自下矣或兼送益母丸次送鹿角灰外貼如聖膏均無不效但服藥固須盡調理之宜生化湯見産後惡露門益母丸益母草一斤端陽後小暑前收連根葉花子當風陰乾為末蜜丸如彈子大臨時捺一丸於熱湯盞內化開生化湯送下鹿角灰鹿角片一錢炒黑為末生化湯送下如聖膏雄黃萆麻子去殼各二錢共搗成膏塗手足心胎衣已下即洗去胎衣不下調護潔胎衣未下時産母只宜坐守不可臥倒必須先斷臍帶用草鞋一隻系之否則胞上抱心而斃如寒日至母到床依人坐定用火籠被中蓋覆時換熱衣暖服自然血旺衣下但下後防虛仍須速進生化湯三四帖注方妙貼注即劑也生化湯方見産後惡露門産畢不可即時臥倒當依人坐定令人以熱手從心下輕輕揉挪至臍腹五六次然後臥下亦不可久坐以致耗乏臥後仍不時揉按庶使惡露不滯其法須將兩足曲豎不可直伸其睡須高枕厚褥四壁無風産畢即煎生化湯二三帖連服數碗如飢則服一煎後食白粥不可過飽片時即服第二煎如不飢將藥服完然後進食自然無塊痛諸病産母腹皮時用小衣烘暖溫之雖暑天亦不可缺被或以薄棉衣蓋護心腹如春冬天氣嚴寒尤當密閉産室四圍置火常令和暖且下部衣被更宜加厚方免胎寒血凝變生諸症初産不可問是男是女恐因言多泄氣或以愛憎動氣皆能致病不可獨宿恐致虛驚犯時微若秋毫成病重於山嶽可不慎哉凡産生之後一月之內無論新産舊産無論春夏秋冬每産母食飲及用小方均令周身潮潤且忌大汗又忌無汗能今日日潮潤必免生諸症集催生諸方佛手散全當歸八錢川芎四錢按此方氣血虧者尤當必服血旺則胎自下如胞衣已破者恐其乾涸將上原方加冬葵子三錢二脫散蛇脫一條白者蠶脫一張煅存性紹酒送下或榆皮為引濟陰綱目云二脫散須加榆白皮一錢調下連進三服覺痛便生三脫散人脫男子脫下頭髮如雞子大一團蟬脫十四枚蛇脫一條俱煅灰為末分三服紹酒送下上方並可治橫生難産胎死腹中三脫六一散蛇脫一條白的蠶脫一張蟬脫五枚滑石一錢二分甘草二分上五味共為末紹酒送下桂乳散上邊桂心一兩乳香一兩去油共為末作三服芎歸湯送下香桂散麝香五分另研官桂三錢去粗皮研各為末和勻作三服童便紹酒下此方系下死胎之聖藥宜慎用之用時蔥白汁調服須臾如手推下滑胎飲益母草川芎各三錢當歸身六錢冬葵子二錢阿膠一兩炒珠滑石粉三錢凡胞漿已破而胎猶不下者當連進二劑或原方加蘇油一兩藥煎畢將油和勻即下屢次經驗催生祕方魚膠一兩用紅棉布一尺卷魚膠以罐盛貯封固火煅存性為末每服一錢用芝麻油蜂蜜紹酒各半盞調服立下此方胞漿水破瀝乾不下者可用油蜜煎芝麻油蜂蜜童便各一碗和勻入銅鍋慢火煎三沸掠去浮沫調入白滑石粉一兩或不用滑石用益母草末一兩亦可拌勻頓服外以油蜜於母臍上下摩之此方治難産瀝漿胞胎不下最妙濟陰綱目云此方甚妥蓋童便取破血又有濁陰下降之理而摩法更妙催生如聖散黃葵子不拘多少焙乾為末熱酒調下二錢神效如無葵子葵花亦可若漏胎血乾難産極痛者並進三服良久腹中氣寬胎滑即産如打撲死胎紅花酒下又方曰黃葵子炒服七十粒難産危時免哭泣華他肘後方巴豆肉三粒萆麻子七粒麝香少許共研如泥捻作餅貼於臍上須臾分娩矣王叔和難産生死歌身重體寒熱又頻舌下之脈黑復青舌上反冷子多死腹中須遣母歸冥身重者胃氣絶也體熱者陰氣虛也寒栗者陽氣衰也舌卷舌下脈青黑及舌反冷不溫乃子母俱傾之候面赤舌青獨留母面赤是營衛流行之氣故留母舌上青色是妊娠絡絶故子死唇口俱青子母傾唇口俱青營衛氣絶也舌青而又營衛俱青故子母俱死面舌俱青頻出沫母亡子活定須應面舌俱青是營衛兩絶吐痰沫是胎氣上衝脾胃氣絶乃子活母死之症王叔和生死脈訣歌新産之脈緩滑吉實大弦急逆分明寸口滑絶不調死沉細附骨命可生按産後身發寒熱其脈多數切不可因熱而作熱治蓋緣血虛陰虧而然只須重用當歸則身熱自退其脈數自漸除若遇前醫生過用桂附者且産母直言心燒將斃生化湯去薑加酒洗乾地黃三錢即愈新産禁補丹溪云産後大補氣血為主雖有他症以末治之昔有陳氏婦新産四五日腹痛寒熱醫者拘於大補之語誤進參耆遍身紫黑髮喘而死殊不知其言治末者即標本之謂也陳氏婦瘀血未淨惡露發熱所謂急則治其標正合用生化湯倍加當歸先去其瘀血則身熱自然漸退矣今驟然大補是失丹溪主末二字之義也又有一婦張氏産後血暈用參附而愈蓋一因血虛補之而痊一因惡露不淨誤補而死一症也一藥也而病不同利害立判是在臨症細心斟酌必須問其惡露有無按之痛與不痛審症的確然後施治方保萬全如瘀血未淨腹痛便結脈現澀滯沉實有神浮洪有力治宜生化湯若或寒或熱脈浮而數按之無力者當遵産後大補氣血為主也
