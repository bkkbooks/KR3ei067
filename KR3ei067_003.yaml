body:
  text: 高氏胎産方案卷三産後上産後總論凡病起於血氣之衰脾胃之虛況産婦氣血脾胃之虛弱殆有甚焉丹溪論産後當以大補氣血為主雖有他症以末治之故治法有氣勿專耗氣有食勿專消食熱不用芩連寒不用桂附如中虛外感見三陽表症之多似可汗也在産後而用麻黃則重竭其陽見三陰里症之多似宜下也在産後而用承氣則重亡其陰至若耳聾脅痛腎虛惡露之停休用柴胡譫語汗出中風類痙之症莫作風治其由陽氣之衰非大補不能回陽而起弱即如因陰血之涸非滋榮不能舒筋而活絡又乍寒乍熱發作有期症類瘧也若以瘧治淹滯難痊神不守舍言語無倫病似邪也若以邪治危亡可待去血而大便燥結蓯蓉加於生化汗多而小溲短澀六君倍用參耆脫肛茄帕俱是氣虛下陷補中益氣是良方也口噤拳攣無非血燥類風加參生化大有益焉産戶入風服以養榮羌獨玉門傷冷洗須床菟萸硫怔忡驚悸生化湯加以遠志似邪恍惚安神丸兼服脾氣因喘咳而滿悶虛煩生化湯加木香為佐因過食而嘔吐惡逆六君子加神麯為良蘇木稜莪大能破血青皮枳實最消膨脹一應耗氣破血之藥汗出泄下之方只可施於強壯不宜用於虛弱大抵新産之後先問惡露何如塊痛何如參朮不可遽加至若亡陽汗脫氣虛喘促加參生化是從權也如亡陰大熱暈厥血崩升舉大補乃急救耳王太僕云治下補下制以緩急制緩以滋道路制急乃氣味俱薄力與緩同是製法當遵丹溪服法須效太僕雖未盡産症之詳已統括治療之要敢曰濟陰之指南其於女科不無小補云生化湯論産後氣血大虛理宜大補但惡露未盡用補須防滯血乃生之而化之能化能生攻血塊無損元氣行中又帶補血方許萬全治無一失世以四物湯治産地黃性寒滯血芍藥酸寒無補其不誤人者幾希矣按生化湯者因藥性之功而立名也蓋産後以化舊生新為要考諸藥性川芎當歸桃仁三品能善破舊血驟生新血佐以薑炭甘草引三品入於肝肺生血理氣五味成方行中有補化中有生實産後之聖藥也故因以生化名之凡孕婦至月足照方預備數帖至胞水一破速煎一劑候兒降生即服不問半産正産雖少壯婦女平安無事俱宜服之生化湯川芎三錢全當歸八錢桃仁十粒炒去皮尖薑炭五分炙甘草五分上五味用水三碗煎至八分加紹酒二兩溫服按生化湯要在産後一二個時辰內未進飲食之先相繼而服則下焦血塊速化新血驟生自免血暈等症但此湯頻服精血漸增産後諸症不能乘虛而襲矣其或勞甚血崩喘汗不止急進加參生化湯數帖或加紅花延胡索生化湯或加桂心生化湯等一一如下及其他變症以生化湯加減之皆一一如下之生化湯加減法生化湯加減法産後勞甚血崩汗喘不止生化湯減甘草加人參二錢大棗三枚或原方加紅花五分延胡索一錢五分研醋炒或原方加桂心七分研産後七日內未服生化湯塊痛未除仍照前原方服生化湯數帖痛甚加延胡索一錢半醋炒研益母草二錢自然塊消痛止不可遽加人參黃耆白朮補住遊血禍不可言産後一二日內塊痛雖未除其産婦氣血虛脫或崩或厥或汗多而厥或形色脫去口氣漸冷或煩渴不止或氣喘短促無論塊痛從權加人參黃耆以扶急危如體倦無力氣虛短促本方多加人參兼汗加黃耆煩躁加竹茹渴加麥門冬五味子喘加杏仁桔梗産後大便不通或至八九日者由血少腸燥故也宜生化湯加麻仁火麻三錢肉蓯蓉五錢以潤之一日自通如大虛加人參二錢勿用承氣湯産後七日內或傷寒冷血塊凝結痛甚生化湯加肉桂五分延胡索一錢或食冷物因之心腹皆痛者再加肉蔻一錢産後肥人多痰宜生化湯加天花粉一錢五分竹瀝半瓶薑汁二錢或加橘紅四分毋輕用牛黃及寒冷等味胎前素虛弱者産後一二日已服生化湯三四帖塊痛稍減可按揉而定宜生化湯加人參三錢産後雖暑月亦要和暖如失蓋衣被腹不溫和風邪乘虛而入雖服生化湯恐塊痛不止宜加肉桂四分研炒五靈脂一錢産後勞倦血暈服生化湯一劑第二劑加人參二錢汗多亦加人參二錢如形脫去只用鹿角炭二錢研末用本湯送下或用本湯送益母丸亦可外用韭菜搗爛納入磁瓶內將熱滾醋兩碗衝入封其口用有嘴的瓶口既封嘴注産婦鼻中斂其精神即醒産後發熱汗出手足厥冷或血崩氣短神昏氣脫乃大虛症急須大補庶可回生宜加參生化湯速進數劑再以生脈代茶毋信産室百問及婦人良方等書産後日久不食聞藥即吐須用獨參湯以安胃氣如聽其胃虛不能受藥則危矣獨參湯即人參三錢或二錢或以黨參代之生薑三片江米二錢又方用胡椒少許人乳汁一盅熱和勻微辣飲加以獨參湯頻頻進之效甚兒枕惡露産後惡露有塊名曰兒枕世多先消後補殊不知舊血雖當消化新血亦宜生養若專攻舊則新血不寧矣世以濟坤丹攻血塊下胞胎者一時雖見速效元氣未免虧損不得已而用之只可一丸不宜多服且須隨進補劑庶免虛弱之害濟坤丹古方益母草二兩當歸一兩川芎四錢白芍四錢炒五靈脂四錢延胡索三錢炒上邊桂一錢丹參八錢炒共為末煉蜜為丸如彈子大每服一丸紹酒送下産後用藥十誤一産後誤用順氣耗氣藥反增飽悶雖陳皮亦不可多用二産後誤用消食藥過多致減食損胃甚至不進食三産後誤用芩連知柏致倒胃增熱甚至不食四産後塊痛未除誤用參耆白朮輕則瘀血不行重則立斃五産後誤用地黃以滯惡露獨用枳殼枳實以消塊痛致耗元氣六産後誤用大黃芒硝以通大便必成膨脹七産後誤用三稜莪朮蘇木以行塊輕則傷新血重則傷性命八産後虛弱之婦誤用山楂煎酒以攻血塊必傷元氣以致汗出不止九産後誤用濟坤丹下胞衣至三四五丸以致百病皆作十産後誤信産室百問及婦人良方多至不救産後血暈凡分娩之後眼花頭旋不知人事謂之血暈其因有三一因勞倦甚而氣竭神昏二因去血多而元氣欲絶三因痰火乘虛泛上而昏憒不清患此三者魂不隨神往來而幾運幾息也急服加味生化湯二三劑以行塊止痛外用醋韭法沖鼻使産母聞氣令精神不散此救血暈之急法也大約病弱産母臨盆之際須預煎生化湯預備韭醋瓶以防患此為萬全及兒降生不可喜子慢母母亦不宜顧子忘倦又不可産訖即臥與夫憤怒氣逆皆能致暈也慎之慎之加味生化湯荊芥五分川芎二錢全當歸六錢薑炭四分桃仁十粒炒去皮尖甘草五分水煎八分入紹酒一盅溫服血塊不痛或無血塊而汗多者原方加人參二錢黃耆二錢血塊痛甚者原方加肉桂五分渴原方加寸麥門冬一錢去心五味子十粒有痰原方加竹瀝半瓶薑汁一匙痰火乘虛泛上而暈原方加橘紅四分兩手脈伏或右手脈絶者原方加麥門冬一錢去心人參四錢五味子二錢按三等血暈切不可用破血耗氣等藥雖山楂性緩亦不宜服其塊痛者生化湯送益母九及鹿角炭倘氣脫將絶牙關緊閉藥不下咽者用鵝翎筒插咽灌之如灌下漸溫暖則不拘劑數灌之又當用熱手自單衣外從心揉至腹上又時換熱衣溫暖之自然漸漸蘇醒如醒後塊痛仍未除者宜用原方生化湯不加不減待塊消痛止再進參耆産後厥逆凡産母産時用力太過勞倦傷脾脾氣耗竭不能注於四旁故足冷逆而厥氣上行經曰陽氣衰於下則為寒厥逆氣上行滿於經絡則神氣浮越去身而飄矣苟非大補焉能回陽而復神必用仁壽生化湯倍人參連進二劑使氣血旺而神復厥止如渴另用生脈散代茶助津以滋臟燥雖有四肢厥冷泄漏或類傷寒陰症亦不可用四逆湯必倍參生化佐以黑姜即炮姜也或加熟附一片以回陽止逆則可已足以行參耆之力矣仁壽生化湯人參川芎各二錢當歸四錢炮姜四分桃仁十粒炒去皮尖甘草四分大棗二枚燒水煎服如厥回去人參待塊痛除再加之此治新産發厥生脈散古方人參四錢或用黨參一兩五味子二錢麥門冬一錢去心代茶滋榮益氣復神湯此方治産後發厥但無塊痛者宜服人參全當歸各二錢麥門冬去心焦白朮川芎各一錢熟地二錢甘草四錢炙橘皮三錢五味子十粒如汗多以原方加麻黃根一錢炙酸棗仁一錢炒黑有塊痛減人參加肉桂五分研大便閉原方加肉蓯蓉火麻仁研各二錢小便閉原方加通草三分有痰原方加竹瀝薑汁橘紅各四分紹酒一杯手足口氣漸冷原方加漢附子五分人參倍用口渴服原方間常以生脈散代茶即前方按厥逆屬陽虛者居多若無塊痛腹脹等症純用參附加肉桂可也有桂則瘀亦去矣不可遲疑暈逆總論大抵産後暈厥皆由氣血兩竭神將去而幾息僅有一線生意耳若非大補不能回將絶之元陽但暈在臨盆尤甚於厥宜頻服生化湯先補血分之虧可期塊化血旺神清暈止如無汗脫神倦氣虛等症切勿遽加參耆或厥在分娩之後氣血兩竭宜用仁壽生化湯以復其神總之治暈問有塊痛參朮未可驟進問無塊痛參朮地耆必須並用仁壽生化湯見産後厥逆門産後血崩産後血水大來須看顏色之紅紫形氣之虛實如顏色多紫乃當去之敗血勿以崩論若紅而色鮮乃是驚傷而心不能生血怒傷而肝不能藏血勞傷而脾不能攝血則當以崩治法以先服生化湯數劑則行中有補血自生旺矣至若形脫氣虛或汗出不止宜仁桂生化湯以益氣斯陽生則陰長而血乃旺非棕炭等藥可治也如産後滿月外患此崩症宜五灰散又宜升舉大補湯治之凡年老有積虛弱人患此崩者均宜服此末二方也生化湯見本卷産後血崩門仁桂生化湯人參三錢全當歸四錢炒川芎三分荊芥四分炒黑桃仁十粒炒去皮尖肉桂五分研二劑後去之酸棗仁二錢炒黑炙甘草五分如汗多原方加黃耆人參各三錢渴原方加麥門冬一錢五味子五分瀉原方加白茯苓蓮子去心炒各二錢六脈俱伏或右手絶者宜用生脈散倍加人參見産後厥逆痰多仁桂生化湯原方加竹瀝薑汁各一錢紹酒一杯咳嗽上原方加杏仁知母桔梗各一錢驚悸原方加酸棗仁炒黑柏子仁炒各研各二錢久不進飲食聞藥即吐用人參一錢水一杯煎焦以煙氣薰之即引開胃口鮮血來多不止以仁桂生化湯加升麻白芷各五錢如無汗脫等症而血崩者宜服生化湯原方加荊芥炭二錢炒透黑服之自安世言芎歸活血不可治崩殊誤五灰散荊芥二錢炒透存性棕皮二錢炒透存性地榆三錢炒透存性杜仲四錢炒透存性續斷四錢黃芩二錢五分炒黑存性人發五分燒灰茯神三錢辰砂拌上方服後血止即換潤補之方然過用主燥干之疾當以升舉大補湯潤之即可升舉大補湯人參白朮土炒各三錢川芎一錢全當歸一錢五分熟地三錢黃耆二錢炙白芷四分陳橘皮黃連炒老研黃柏炒瀉者勿用羌活防風各四分升麻甘草各五分上方治産後日久血崩不止或如雞卵大塊或去血如片宜大補脾胃升提氣血少加鎮墜心火之藥此方並治老少血崩等症如渴原方加麥門冬去心五味子各五分瀉原方加蓮子一錢五分去心炒痰原方加半夏二錢姜炒兼白帶原方加蒼朮炒半夏姜炒各一錢産後類傷寒三陰症産後潮熱有汗大便不通毋專論為陽明症口燥咽乾毋專論為少陰症腹滿嗌乾大便祕結毋專論為太陰症又汗多譫語毋專論腸胃有燥糞其諸症多由勞倦傷脾運化稍遲氣血枯竭所致治宜養正通幽湯勿執偏門妄用承氣致沾唇莫救按此論更當細玩即書所謂産後以大補氣血為主雖有他症以末治之之意又即甘溫能除大熱之旨也養正通幽湯蓯蓉五錢廣橘皮四分川芎二錢五分甘草五分炙桃仁五粒炒去皮尖火麻仁三錢炒研諸症加減如前惟汗出譫語便實乃氣血兩虧神衰心主失守急宜養榮安神此方加茯苓酸棗仁柏子仁人參黃耆白朮各一錢大便至十日燥結不通肛門必有燥糞用蜜煎人皂角末或豬膽汁及枯鹽導之勿用下藥泄瀉不止或致虛閉以成膨脹為害不淺産訖第一須服生化湯數劑必無血燥腸枯之症産後類傷寒三陽症産後七日內發熱頭痛惡寒勿專論為太陽症發熱頭痛脅疼勿專論為少陽症二症皆由氣血兩虧陰陽不和而類外感切不可用麻黃湯以治太陽類症用柴胡湯以治少陽類症蓋脫血之餘又發汗以重亡其陽是使陰陽兩竭禍不勝言即或症中真感傷寒而橘仁生化湯內芎姜亦能散寒且營衛調和諸症自退橘仁生化湯橘皮三分桃仁十粒去皮尖炒研川芎一錢全當歸三錢薑炭五分甘草五分大棗二枚炒上方連進二劑如感冒風邪二劑不退第三劑加羌活四分蔥白二寸或加益母草二錢減甘草産後美中風痙症産後手足搐搦眼目上視角弓反張口眼歪斜舌喑不語痰涎上湧不省人事者皆由風寒入於腠理經絡不和所致與中風相類切不可作風治急須補氣壯陽為主治宜右歸飲加味續命湯等若用風燥藥重耗其陽以亡其陰如蘇合丸之類入口即斃加味右歸飲熟地八錢姜炒枸杞三錢酒炒山萸肉四錢酒炒山藥四錢炒澤瀉二錢丹皮二錢酒炒附子三錢桂心一錢茯苓三錢鹿角膠三錢巴戟天三錢去心炮姜八分加味續命湯人參二錢白朮二錢土炒茯苓二錢炮姜八分附子三錢細辛五分黃耆三錢用防風二錢酒拌炒當歸身三錢法半夏一錢甘草八分炙枸杞三錢鹿角膠三錢語而不認人時語時不語者原方加九節石菖蒲一錢五米汁炒天竺黃一錢五分白通膽汁湯白朮二錢土炒乾薑八分附子二錢制茯苓二錢甘草一錢炙蔥二棵去葉去白水煎人豬膽汁三匙沖服回族用此方以牛膽汁一匙代之即可真武湯附子三錢乾薑二錢白朮二錢土炒茯苓二錢歸身二錢肉桂一錢甘草八分炙白芍一錢五炒酸棗仁二錢炒研黑錫丹黑錫一兩舶硫磺一兩研此二味先和入溶化結成砂子研細漢附子五錢制肉桂三錢盔沉香三錢小茴香三錢炒黃檀香三錢肉寇三錢煨陽起石三錢煨乾薑一錢胡蘆巴三錢炒廣木香三錢煨白蔻三錢川楝子五錢炒公丁香二錢共為細末水打為丸如核桐子大陰乾用黑淨布袋裝入搖之至光如銀亮為度收藏每用四十九粒或三十二粒淡薑湯送下按此丹不拘中風痙症痰鳴氣喘者皆可服之産後癱瘓症凡産後癱瘓類風病者皆因去血過多元氣已損氣血不能生新以致經絡不調筋骨疼痛甚至半身不遂風廢床褥經年不愈手足麻木不仁拘攣不知痛癢若誤認為風症妄用祛風散血燥烈等藥多致不救治宜虎骨鹿茸丸及保安萬靈丹虎骨鹿茸丸虎脛骨一對如不得以虎骨膠三兩代之或虎脊骨十四兩亦可鹿茸一對羊酥蒸炙如不得以鹿角膠四兩代之枸杞三兩小茴一兩紹酒一兩拌炒菟絲餅三兩巴朝天三錢去心酒炒蒺藜二兩酒炒補骨脂一兩五鹽水炒肉桂一錢五陳皮一兩威靈仙一兩五防風一兩川杜仲三錢鹽水炒斷絲淫羊藿三兩山羊油炙蠍子爪三錢酒洗淡炒當歸身三錢酒炒川萆薢一兩鱉甲二兩醋炙鹿筋一斤如無之牛筋亦可亦一斤十八味若用虎鹿二膠先用砂鍋溶化入鹿筋以燉爛如泥為度將彼十五味共研為末江米一斤炒研末煮稠糊和飴糖三斤溶化以上和勻搗為稠泥作丸如梧桐子大每服五錢紹酒浸紅花蘄艾少許煎水送下忌生冷若用虎骨鹿茸即將前十七味共為末入筋泥與米糊內和糖為丸保安萬靈丹古方又名筋骨風疼丸此方治風寒百症如左癱右瘓筋骨疼痛等症明天麻真何首烏各一兩蒼朮八兩麻黃川羌芥穗防風細辛川烏草烏川芎金石斛全蠍子當歸甘草各一兩明雄黃六錢共為末蜜丸三錢一丸雄黃為衣黃酒紅糖引旦夕服用以治外科亦效如神産後類瘧産後寒熱往來應期而發此由氣血並竭陽虛生外寒陰虛生內熱晝輕夜重或日晡潮熱一日二三度其症雖似乎瘧而發無常期只須四君生化湯倍加當歸則身熱自退即或應期而發症與瘧同亦必調和氣血為主勿用芩連等治熱及常果檳楂等截瘧如汗多加參耆熱多倍用川芎當歸若産及一月其人素虛而患瘧用人參養胃湯並服人參白朮膏四君生化湯人參一錢白朮一錢土炒茯苓八分甘草三分炙當歸二錢青皮二分川芎一錢廣藿香八分烏梅二枚渴原方加麥冬一錢去心五味子三分痰原方加半夏八分姜炒竹瀝薑汁各五分汗原方加黃耆酸棗仁各一錢各炒傷米食原方加神麯麥芽各一錢各炒傷肉食原方加山楂砂仁各五分研人參蕎胃湯人參白朮土炒當歸各二錢茯苓半夏各八分炒青皮炒草果甘草藿香各四分烏梅二枚人參白朮膏白朮一斤土炒人參一兩水六碗煎去其半取汁如法再煎如此三次去渣汁九碗慢火熬至一碗每日服半酒杯滾白水沖服産後疸症黃疸症平人皆有産後更甚多致不救蓋甲乙木屬肝膽乃東方資生之氣膽屬足少陽乃半表半裡之經若外感風寒內束經絡醫治不善寒濕入膽久郁為熱擾害清淨之腑逼出膽汁浸淫毛竅化為黃色甚至汗黃眼黃便黃如金汁者甚為費手治宜加減陰疸湯陽虧者加桂附陰虛者加當歸身熟地微熱者加丹皮茵陳清涼等藥治濕溫黃疸之聖藥然産後黃疸則忌之産後黃疸名陰疸發肝膽故宜加減陰疸湯加減陰疸湯人參二錢柴胡一錢白芍八分酒炒甘草八分炙乾薑一錢法半夏一錢研西黨參三錢姜炒服至十劑其症自愈若寒家患此症用此方者以黃耆三錢炒代人參陽疸即以清涼藥如茵陳等藥治之雜科諸書皆詳産後汗出不止産後汗出不止由勞傷脾驚傷心怒傷肝患此三者不宜即加斂汗之藥但令神寧則汗自止且血塊作痛耆朮未可遂加凡産畢有汗先服生化湯兩劑以消塊繼服調衛止汗湯若倦甚而和和然汗出形色俱脫乃亡陽汗脫也難拘常法從權以參耆調衛救急待産母稍有精神又減參耆以除塊痛若汗多而陰竭陽微以筋脈拘急項強口噤牙噤發搐類傷寒痙症者慎勿作傷寒治宜天麻生化湯隨症加減汗雖有自汗盜汗之分治當兼理血分藥品余方但非産後盜汗所宜若服參耆大劑汗多不止及頭面汗出不止腰足青色者死不青色者生調衛止汗湯黃耆炙麻黃根炙全當歸各一錢人參五分防風三分桂枝三分甘草五分炙大棗二枚汗多而渴原方加麥冬一錢去心五味子五分汗多亡津而小便不利毋用利水等藥産母多痰毋用半夏生薑只可原方加橘紅四分從權參耆調衛湯人參三錢黃耆一錢五炙麻黃根一錢五炙當歸二錢桂枝五分汗少減則加防風三分大棗二枚炒若汗出不止真陽已衰衛外之陽不固方內當加漢附子酸棗仁炒黑白朮土炒壯力粉黃耆炙各二錢重用為佳亦酌量用之以適宜為本天麻生化湯天麻八分黃耆一錢五川芎三錢當歸六錢甘草五分炙人參三錢虛人倍用荊芥八分大棗三枚炒渴原方加麥冬五味子各五分脈脫原方加人參三錢漢附子四分制大便閉原方加火麻仁三錢痰原方加竹瀝薑汁各五分忌蔥韭辛熱食物産後氣短髮喘産後血脫勞傷過甚氣無倚仗呼吸止息各違其常氣出短促而喘言語不相接續是血脫氣虛之至速煎小參苓生化湯二劑以救急或服續氣養榮湯再備醋韭瓶以防暈毋疑參能助喘不用及少用皆致不救惟一切降氣之藥禁用若虛不受補聞食即吐胃氣將絶不治之症也如原方加訶子或可望生小參苓生化湯人參二錢茯苓一錢川芎一錢當歸三錢炮姜五分甘草五分炙桃仁三分炒去皮尖汗多原方加黃耆二錢炙渴原方加麥冬五味子各五分喘急不止原方加訶子二錢炒去核胃虛不食聞藥即嘔見寒涼等物益吐宜高麗參三錢生薑三片黃米一撮煮湯飲之即安以黨參一兩江米四兩生薑五片煮食亦效續氣養榮湯人參二錢黃耆一錢炮姜五分川芎二錢當歸四錢甘草五分炙熟地酸棗仁砂研山藥炒各一錢陳皮三分足冷原方加漢附子三分汗多原方加麻黃根一錢炙浮小麥一撮研炒渴原方加麥冬五味子各五分大便閉原方加肉蓯蓉火麻仁各三錢宗嶽曰先嚴昔治此症喘哮不止以原方減熟地甘草山藥加訶子款冬花各三錢紫蘇子一錢研此處遺今補之産後咳嗽産後旬日內感冒風寒咳嗽鼻塞聲重惡寒併兼身熱頭疼宜服加參寧肺湯毋用麻黃以發汗或喘及兩脅痛毋用小柴胡湯以散邪或患干嗽有聲痰少面赤亦毋用涼藥以清火惟有調理氣血為主若半月干嗽有聲而痰少者可用加味四物湯治之加參寧肺湯人參二錢當歸三錢川芎一錢桔梗四分橘紅四分杏仁去皮尖十粒款冬花炙一錢桑白皮炙七分半夏炒八分知母一錢如虛人痰盛原方加竹瀝一小盞薑汁三匙甘草四分加味四物湯熟地當歸各二錢川芎蔞仁炒研知母訶子炒去核各一錢桔梗馬兜鈴各四分款冬花炙六分參蘇飲薛立齊此方治産後瘀血入肺使之咳嗽喘急人參三分蘇木一分溫服服後喘仍不止原方加萊腋子一錢産後譫語産後妄言妄見由氣血兩虛而神魂無所依也輕則睡中呢喃重則不睡妄言或因痰客上焦十二官各失其職視聽言動皆有虛妄誤認鬼邪治法當論産期新久塊痛有無以為緩急如塊痛者宜服寧神生化湯塊痛已除宜服益榮安神湯寧神生化湯柏子仁炒研一錢桃仁炒去皮尖十粒炮姜五分酸棗仁炒研川芎各二錢甘草炙五分當歸四錢大棗去皮二錢虛甚者原方加人參二錢益榮安神湯柏子仁炒研酸棗仁炒研茯神各一錢當歸二錢川芎一錢橘紅五分人參一錢甘草五分龍眼肉八個竹茹五分大棗炒二枚渴原方加麥冬五味子各一錢汗多原方加黃耆三錢人參倍用麻黃根三錢痰多原方加竹瀝薑汁各一錢泄瀉原方加茯苓白朮土炒各一錢大便閉原方加肉蓯蓉二錢火麻仁三錢研産後怔忡驚悸産後憂驚勞倦去血過多心中煩動不寧謂之怔忡如惕然而驚心中怯怯若人捕之狀謂之驚悸二症當調和脾胃補養心血使氣寧神足氣舒心安以加減養榮湯其病自愈兼送安神丸益善加減養榮湯人參茯苓白朮土炒各一錢甘草炙陳皮各五分當歸二錢川芎八分麥冬去心酸棗仁炒研遠志去心甘草水炒黃耆炒各一錢龍眼肉八個生薑三片虛煩原方加柏子仁炒研一錢丹參一錢五竹茹三分痰多原方加竹瀝薑汁各五分安神丸川黃連乾地紹酒人乳拌蒸九次當歸各二錢甘草八分上搗為餅曬乾再為末煉蜜為丸如緑豆大硃砂為衣每服四十丸用前方養榮湯送下産後忿怒産後因忿怒氣逆不舒胸膈滿悶血塊大痛宜廣木香細末三分用生化湯原方沖服而塊自行矣若偏用香砂枳實烏藥之類以散氣行塊則反使元氣耗損而滿悶愈增如怒後即食胃虛傷滯當審所傷何物如傷肉食加砂仁山楂傷米食加神麯麥芽傷冷物作痛留滯腹脅加肉桂吳茱萸逐寒定痛慎勿服檳榔丸疏氣以消食宜健脾化氣飲生化湯見本卷産後血崩門健脾化氣飲人參白朮土炒當歸各二錢川芎炮薑甘草炙各四分如塊痛未除仍用生化湯送廣木香末三分方再加肉桂研末八分更佳以桂能平肝而利氣也産後傷食産後形體勞倦脾氣受傷不宜多食厚味食之胃雖少納脾轉運滯以致痞塞暖酸治當溫補氣血健脾助胃養正兼消並審所傷何物佐以消導斯脾氣復而運轉如常滯物行而胃始納穀矣若消導過多必致絶谷難治急以長生活命飲救之長生活命飲人參二錢水二碗煎八分以饅頭燒焦研末三錢調服如寒窘之人不能服參者單用焦饅頭末水沖服之或以白朮二錢煎湯調服亦可胃開即愈山藥主化湯山藥炒一錢當歸二錢炮薑甘草炙各五分川芎一錢完穀不化原方加肉蔻煨一個塊痛原方加桃仁炒去皮尖十粒痛止而虛者原方加人參白朮土炒各一錢所傷何物治如産後忿怒門及産後傷食門身熱禁用寒冷藥痞滿禁用耗氣藥産後泄瀉産後泄瀉大率虛弱食積土虛不能勝濕而然但惡露未除脾胃又弱難於消燥而用補也治法先服生化湯一煎後即加茯苓一錢以利小便俟血生化然後議補議消議燥使無滯澀虛滑之失若産畢即瀉者宜蓮子生化湯若胎前久瀉産後不止者宜大參苓生化湯從權以防虛脫若久瀉不止或脾瀉者須服參朮蓮子飲百劑甚至形脫眼花者服丹溪救急方蓮字溪字嶽先嚴之諱也嶽當不書然古之先工云臨文不諱否則後之請者不曉此家藏之本不著明此意恐子孫惑之凡嶽也之藥方上皆以聯字代之蓮子生化湯蓮子福建産者去心炒八分茯苓一錢五訶子炒去核八分桃仁炒去皮尖十粒炮姜五分當歸土炒一錢五川芎一錢甘草炙五分生薑一片水煎二劑如瀉不止原方加人參三錢大參苓生化湯人參二錢茯苓一錢五川芎一錢當歸土炒二錢炮姜五分甘草炙五分陳皮一錢白朮土炒一錢五肉蔻煨研訶子炒去核各一錢蓮子炒去心研八分糯米一撮寒瀉原方加砂仁五分熱瀉原方加黃連薑汁炒三分久瀉原方加升麻三分水瀉原方加蒼朮炒一錢瀉出肉食如敗卵及噫氣原方加神麯砂仁各八分山楂麥芽各炒焦各五分肉蔻公丁香各一分渴原方加麥冬五味子各五錢參朮蓮子飲人參白朮土炒各二錢茯苓一錢當歸一錢五白芍酒炒八分甘草炙五分陳皮升麻各三分山藥炒一錢蓮子去心炒研十粒生薑一片如腹痛原方加乾薑五分丹溪救急方人參五錢白朮土炒三錢茯苓三錢漢附子制一錢以上各方虛渴者均可加五味子二十粒酒炒麥曲粉炒黃二錢虛脫者暫加枯礬少許以澀之然後再按症加減産後痢症産後七日內患赤白痢疾後重頻數最為難治八日亦然欲調氣血而推蕩邪穢又慮産後元氣虛欲滋榮養氣而大補脾腎又恐補住瘀邪惟生化湯減炮姜加陳皮木香等味善消惡露兼行痢疾並行而不悖也再服加味香連丸以俟一二日後病勢稍減可保無虞若七日外患褐色後重虛痢則當加補無疑其産母稟厚産期已過二十日可於生化湯加芩連芍枳及加味香連之類承氣等藥斷不可用若産母虛弱雖及月餘行積峻劑切不宜用若産後陰虛血痢日久愈甚當用四物湯加人參矣陳皮生化湯陳皮五分木香二分茯苓一錢五川芎二分當歸四錢桃仁炒去皮尖十粒血痢一名紅痢腹痛者原方煎湯送香連丸三十粒加味香連丸木香二錢黃連姜炒三錢蓮子去心炒五錢水打為丸緑豆大連芩生化湯又名黃連生化湯黃連薑汁炒研六分黃芩酒炒四分白芍酒炒一錢枳殼麩炒五分川芎一錢五茯苓一錢木香三分甘草四分當歸土炒三錢病重者加山楂炒焦一錢人參二錢按産後痢症不一總以人參為主歸芍次之兼有瘀未淨者則兼以肉桂益母草黃連湯重用人參自效蓋桂益去瘀也如資稟薄痢症輕者一日六七次兼有糞色亦能飲食重者空痛一日夜數十次不思飲食睡臥不寧非人參不能救也人參四物湯人參三錢川芎五分當歸二錢土炒乾地黃一錢炒焦白芍二錢酒炒申論瀉痢十方産後瀉痢氣血暴虛必用生化湯加減然致病之由雖系濕熱多因食傷脾而起故重申余意另立十方於後一産後瀉黃色乃脾土真氣虛也宜補中益氣湯加木香四分煨肉蔻一枚炮姜四錢補中益氣湯見卷一胎前子滿門二産後久瀉不止元氣下陷大便不禁肛門如脫宜服六君子湯加木香四分煨肉蔻一枚炮姜四分升麻五分六君子湯陳皮一錢半夏二錢茯苓三錢人參三錢白朮二錢甘草一錢三産後傷麵食宜六君子湯加麥芽三錢傷穀食加神麯三錢方見上條四産後傷肉食宜六君子湯加山楂炒砂仁各五分神麯一錢炒五産後胃氣虛弱瀉痢完穀不化宜六君子湯加木香三分肉蔻一枚煨方見第二條六産後瀉痢脾虛四肢浮腫宜六君子湯加五皮飲六君子湯方見第二條五皮飲大腹皮一錢半茯苓皮三錢地骨皮三錢五加皮三錢陳橘皮三錢七産後諸症兼嘔者諸方俱宜加藿香一錢痰多加半夏八分炒八産後諸症兼小便短澀者諸方俱宜加茯苓一錢澤瀉五分燈芯十二根車前子一錢炒研九産後泄瀉不止宜六君子湯加蓮子十粒酸石榴皮一錢六君子湯見本門第二條十産後患赤痢久而不愈者香連丸二錢人參二錢煎湯送丸即愈勿過用木香薑汁之類蓋血之一部見熱則行寒則止然下赤痢紅即血者宜香連丸人參地榆炭煎湯送丸以上諸方必須問其有塊痛否無則宜之若有塊痛仍以生化湯為本産後嘔逆人之胃腑為五穀之海水穀之精上輸肝肺分布五臟化為氣血榮潤百骸産後勞傷脾胃正氣虧損邪氣易乘如入於脾胃則氣逆嘔吐而食不下矣若七日內嘔吐不止全不納穀血塊未除治當消塊佐以溫藥宜服安胃行血湯若痛已除而嘔不止不納穀者宜服加減六物湯及後溫中和胃飲若嘔而氣血不足食物不能如常宜服補中和胃湯安胃行血湯藿香砂仁炒研各四分川芎一錢當歸四錢桃仁十粒炒去皮尖炮姜甘草炙各五分人參一錢生薑三片有汗勿用加減六物湯白茯苓人參川芎各一錢當歸白扁豆炒研各二錢山藥一錢五分炒藿香五分豆仁即山豆根苗上子也四分炮姜四分陳皮三分甘草五分炙生薑三片嘔止去豆仁溫中和胃飲人參茯苓各一錢當歸白扁豆炒研各二錢陳皮藿香甘草炙丁香公丁各三分生薑三片寒原方加吳茱萸一錢嘔止減丁香補中和胃湯人參白朮土炒白扁豆炒研當歸各二錢茯苓一錢山藥一錢五分炒陳皮炮薑甘草炙各四分按産後諸症以嘔逆為甚急當用香砂六君子湯加制漢附子吳茱萸柿蒂如不效加酒炒黃連肉桂若更不效則必用二氣丹矣香砂六君子湯陳皮五分半夏一錢炒人參二錢白朮一錢土炒茯苓二錢甘草五分木香五分砂仁四分炒研嘔逆甚急上原方加漢附子吳茱萸柿蒂各一錢如不效再加黃連酒炒肉桂各五分二氣丹水銀三錢硫磺三錢上二味同入鐵鍋內結成砂子研細末不見銀星為度米糊為丸如梧桐子大每服二十粒加至四十九粒皆公丁香柿蒂各一錢煎湯送丸水銀得硫磺自化呢逆霍亂皆可用之産後霍亂産後勞氣傷血臟腑虛損不能運化食物及冷風相乘以致陰陽升降不順清濁亂於腸胃冷熱不調邪正相搏上吐下瀉名曰霍亂若塊痛未除宜生化六合湯塊痛已除宜藿香和胃散生化六合湯陳皮四分當歸四錢川芎二錢炮姜四分炙甘草四分茯苓一錢砂仁六分生薑一片藿香和胃散廣藿香四分川朴八分姜炒陳皮炮姜各四分當歸白朮土炒各三錢人參一錢甘草三分炙生薑一片若手足逆冷原方加漢附子三分産後膨脹胎前素弱産後又虧胃難納穀脾不健運或因傷食而停滯或因血虛而便閉誤進消耗等藥胃氣益損滿悶益增氣不升降滋熱助積鬱積之久遂成膨脹治當審其誤用何物如誤用耗氣藥宜益氣湯誤用消導藥宜健脾湯誤用攻下藥宜養生化滯湯益氣湯古方人參白朮土炒當歸各三錢川芎白芍酒炒各八分紫蘇梗甘草炙各五分茯苓一錢五陳皮厚朴姜炒各四分大腹皮六分木香二分研末萊蔔子五分炒研木通五分健脾湯古方人參白朮土炒全當歸茯苓白芍酒炒神麯各一錢川芎七分陳皮四分甘草炙砂仁炒研各五分大腹皮五分食物傷胃原方加麥芽五分冷物傷胃及冷物入腹作痛原方加吳茱萸鹽炒一錢養生化滯湯人參一錢五當歸四錢川芎二錢白芍一錢酒炒茯苓一錢白朮二錢桃仁十粒炒去皮尖大腹皮四分肉蓯蓉一錢五酒洗脹甚原方白朮加倍首三味減半塊痛未除原方送三消丸一錢方見産後下産後總三方第一方病劇者須服至數十劑按産後脹症最為難治如服前方未效非大劑金匱腎氣湯不能去其病若慮方內熟地黃之滯則用薑汁砂仁拌炒桂附更當重用再加椒目蒲種殼冬瓜子以利水化氣或加浮萍草為引以開鬼門多服益善俟脹消後則用六君子八珍等湯調理可以復原去根此經驗已多故附增之金匱腎氣丸古方乾地黃八兩山萸肉山藥各四兩白茯苓牡丹皮各三兩肉桂制漢附子各一兩共為末蜜為丸六君子湯古方二陳湯四君子湯並用即六君子湯也陳皮半夏人參白朮茯苓甘草八珍湯古方四君子湯與四物湯並用即八珍湯也人參白朮茯苓甘草當歸川芎地黃白芍産後口渴或兼小便不利凡産後口燥咽乾而渴兼小便不利由血枯而多汗且勞倦傷脾不能為胃行其津液則生化之氣不運滲泄之令不行是以上無津液流通而有咽乾燥渴之症下則膀胱閉滯而有水道不通之候治當助脾益肺升降氣血則氣血流行陽升陰降自然津生而便利矣若認口渴為火盛而用芩連知柏以降之便澀為水滯而用五苓等味以通之非徒無益而反害之梅村曰此論非常真切小便由於氣化氣足小便順否則反是書曰氣化則能出矣故補氣生津實至言也膀胱藏津液之所真陽不足元氣不升則不出矣是以補氣填精為上書云男女媾精萬物化生以此證之男女各有精也宗嶽集注助脾益肺湯人參黃耆麥冬去心當歸各二錢五味子十粒升麻四分茯苓一錢五葛根一錢甘草四分炙汗多原方加酸棗仁二錢炒研麻黃根一錢炙大便不通原方加肉蓯蓉二錢小便不利而産母壯盛熱劇者暫以原方加知母滑石粉各一錢便稍利則減渴甚以生脈散代茶生脈散古方麥冬去心二錢五味子一錢人參三錢水沖或水煎皆可
