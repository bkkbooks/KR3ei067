body:
  text: 高氏胎産方案卷四産後下産後便數淋症凡産後小便數者由腹內夙有冷氣因虛而發宜桑螵蛸散或以益智仁二錢炒研為末米飲送下若淋漓作痛亦由産母虛弱冷氣客於腹中以茅根湯治之或御製通便祕方或以金鑰匙散治之桑螵蛸散桑螵蛸二十枝人參三錢黃耆三兩鹿茸牡蠣赤石脂各二兩共為末每服二錢大米湯送下白茅根湯白茅根瞿麥茯苓車前子炒研通草滑石粉麥冬去心甘草分數臨症酌用燈芯五寸御製通便祕方清朝宗室祕方專通小便用陳倉小米半斤淘濃泔澄清熱服小便即通若血淋米泔湯加淮牛膝二錢金鑰匙散龔狀元方此方專行通淋滑石蒲黃各三錢共為細末每服二錢白沸水沖服産後傷脬小便淋數不止産後傷脬此緣穩婆不慎之故急以白及散治之白及散白及鳳凰衣即生雛之雞卵皮桑螵蛸各三錢共為細末入豬脬內煮爛食之即愈産後水腫産後四肢浮腫皮膚光滑脾虛不能制水腎虛不能行水故也當大補氣血為主佐以蒼朮白朮茯苓等藥虛加人參熱加木通麥冬黃芩若因風冷濕氣傷表無汗而腫宜五皮散加薑皮半夏蘇葉以微表之使水氣從皮毛而出然後以補劑調理利水大補湯人參黃耆何首烏各二錢白芍酒炒茯苓皮各二錢白朮三錢土炒陳皮六分木瓜八分蒼朮炒川朴炒大腹皮木通各一錢加味五皮散大腹皮五加皮茯苓皮地骨皮薑皮青皮醋炒半夏薑炒蘇葉各一錢水煎服産後熱蒸成勞瘵症産後勞瘵症皆由嗜欲無節起居不時以致真陰耗竭虛火上炎或蒸而熱或往來寒熱似瘧非瘧或咳血咯血自汗盜汗或心神恍惚夢與鬼交或經水閉塞日漸羸瘦皆緣陰虛生內熱所致熱鬱積久變成虛怯宜清熱止嗽潤肺瀉火滋補真陰以復其元患此者必須寡欲內養方能有效否則不治保真湯川貝母去心茯苓各五分川芎麥冬去心地骨皮各一錢當歸生地白芍酒炒各二錢五味子十粒研天冬一錢半炙桔梗八分甘草三分炙大棗二枚虛甚原方加人參一錢黃耆八分脾胃弱原方加白朮土炒山藥炒各二錢砂仁三粒炒研加味大造丸紫河車一具清水洗淨新瓦燒乾生地一兩人參當歸山藥炒枸杞各一兩知母一錢五金石斛酒蒸麥冬去心各八錢銀柴胡六錢龜板五錢醋炙共為末煉蜜為丸如桐子大每服三錢白水送下旦夕用按以上二方但舉其概至辨症施治全在臨時裁取如補中益氣湯六味腎氣丸八珍湯十全大補湯還少丹加味逍遙散此數方俱可治勞瘵因症選用可也蓋産後氣血已虧陰陽兩竭應得大溫大補助真陽以生真陰引火歸原法當用真阿膠上肉桂為主將虛火假熱下降丹田加以苓朮參耆健脾補氣略以龜膠石斛炒熟地沙苑蒺藜補陰以佐助之服至四五劑必見效矣切不可用滋陰清肺等藥以重危之也俟其胃開脾運火降陽回然後再於溫補之中加入治嗽等味自可活人如服清涼藥過多必至真陰上越如症現兩顴紫紅氣虛上喘眼白處淡紅須用製附子遲則陽脫矣補中益氣湯方見卷一胎前子滿門六味腎氣丸熟地黃八兩山萸肉山藥各四兩雲茯苓牡丹皮各三兩桂枝一兩共為末蜜丸桐子大紹酒送下八珍湯古方見卷三膨脹門十全大補湯即八珍湯加邊桂黃耆喻氏還少丹山藥牛膝遠志山萸白苓五味巴裁寸云菖蒲楮實杜仲茴香枸杞熟地黃各二兩蜜丸酒引加味逍遙散方見卷一胎前小便帶血門産後心腹痛附真心痛産後心痛即胃脘痛以胃脘在心下俗謂之心痛實胃脘痛也平常亦有之皆因傷寒氣及生冷食物故作痛平常專散寒行氣而消積化食産婦用生化湯佐以散寒消食之品無有不效若腹內痛必血塊未除只服生化湯佐以益母丸鹿角炭治之則瘀消痛止若風冷乘虛作痛亦宜茱桂生化湯因方有肉桂吳茱萸可以溫散之也茱桂生化湯肉桂八分研吳茱萸七分鹽炒川芎二錢當歸四錢炮薑甘草炙各五分桃仁十粒炒去皮尖研生薑三片傷米食心胃痛上原方加神麯麥芽各一錢炒傷肉食心胃痛上原方加砂仁山楂炒焦各一錢中怒氣心胃痛上原方加烏藥白蔻各五分延胡索一錢醋炒若中寒氣倍加桂薑然心痛有九種皆以加味理中湯治之加味理中湯此方治九種心痛人參一錢白朮二錢土炒茯苓二錢甘草七分炙乾薑一錢因血痛減半炒炭用之漢附子二錢肉桂一錢五分研白蔻五分延胡索一錢醋炒乳香一錢五分炒去淨油一氣心胃痛原方加木香一錢鬱金一錢酒炒良薑一錢醋炒丁香十隻紫色二血心胃痛原方加五靈脂一錢五醋炒蒲黃七分炒當歸身二錢酒炒三寒心胃痛原方加吳茱萸一錢鹽炒蘆巴二錢鹽炒小茴香一錢五分鹽炒四食心胃痛原方加神麯一錢五炒山楂二錢炒雞內金二錢焙廣橘皮一錢母丁香七分五蟲心胃痛原方加川椒四十粒烏梅二個黃連先用一錢煮汁以連汁炒吳萸八分棐子肉三錢六痰心胃痛原方加法半夏二錢肉蔻一錢煨海沉香一錢牡蠣粉二錢橘紅一錢七積心胃痛原方加母丁香八分盔沉香一錢佛手柑一錢巴豆霜三分焙乾用濕豆腐皮包裹作小丸形用前汁冷透送下此丸但巴豆霜必積痞現脾積為之氣痞而不化病甚急他藥不效時實不得已而始用之再察霜中去淨油否慎之男子用之不必去淨油八虛心胃痛虛有陰虛陽虛之別陰虛原方加熟地一錢益智仁砂仁各六粒研合薑汁同拌炒焦用枸杞二錢酒炒阿膠二錢蒲黃炒銑萸肉二錢酒炒薑將原方中之乾薑減半炒黑陽虛原方中人參乾薑加一倍九實心胃痛原方減人參白朮肉桂附子加枳殼二錢炒草蔻一錢研桂枝八分醋炒甚者原方加川大黃三錢將大黃先為末用菲菜汁拌均九蒸九曬特真心痛指甲青黑手足冷朝發夕死以美芙蓉炭五分水沖服立愈按産後胃氣痛其人必素有舊病産後氣血大虧其病自然加甚但症有九種當辨氣血寒食蟲痰積虛實治宜加味理中湯為主以上各症加減必須認明證侯然後施治為要産後遍身疼痛及腰腹痛凡産後遍身疼痛由産時百節開張血脈凝滯纍日不散則經脈經絡不舒故腰背不能轉側手足不能動履或兼身熱頭痛若誤認太陽表邪而發汗則手足逆冷變成險症矣宜祛痛散治之婦人腎位系胞腰為腎府至産勞傷腎氣損動胞絡或産未平復而風寒乘之二者皆致腰痛宜養榮壯腎湯或加味大造丸若小腹作痛未曾服生化湯問惡露如何若可按揉而稍止者屬虛並宜桂延生化湯治之光緒丁酉泰安城汛把總周振甲先生之夫人患産後遍身疼痛以祛痛散加減三劑而愈繼服桂延生化湯二劑復元即本門第四方祛痛散人參白朮炒各一錢當歸二錢黃耆八錢炒川牛膝三錢獨活一錢半肉桂五分研韭白一撮生薑一片秦艽三錢水煎有汗減生薑獨活無汗加益母草三錢肚痛加醋炒五靈脂四錢減參耆養榮壯腎湯續斷杜仲炒炭獨活桂心研川芎各八分防風四分當歸二錢桑寄生八分生薑三片加味大造丸方見本卷熱蒸成勞瘵門桂延生化湯肉桂研延胡索炒炮薑各四分甘草三分桃仁十粒炒去皮尖研川芎一錢當歸三錢如痛止原方減肉桂延胡索如臍下無血塊而仍痛不止者原方加熟地三錢産後乳癰乳疽産後乳癰乳疽初發時寒熱往來如瘧不可作瘧治亦不可全用敗毒消疽等味當大補氣血佐以金銀花等味以散邪毒若膿未成痛不可忍宜瓜蔞乳沒散已成膿宜排膿大補湯外用馬蹄香搗爛敷之若膿已出而虛弱日甚宜十全大補湯瓜蔞乳沒散全瓜蔞一枚皮仁皆搗爛當歸金銀花各三錢白芷一錢青皮五分乳香去油沒藥炒各五分甘草四分炙蒲公英五錢水煎加酒一盅服排膿大補湯人參白朮土炒生地金銀花各二錢全當歸三錢茯苓三錢黃耆四錢炒連翹五分去心青皮三分烏梅一個研白芷五分大棗一枚十全大補湯古方本卷第四章略述此詳之人參三錢白朮二錢土炒熟地五錢炒當歸三錢茯苓四錢川芎一錢甘草二錢肉桂一錢研黃耆三錢白芍三錢酒炒泄瀉原方加蓮子十四粒研肉豆蔻一枚煨研口渴原方加麥冬五味子各一錢不長皮原方加雞內金二錢不收口以參末膏藥貼之或原方加浙貝母三錢按乳癰乳疽潰後總以十全大補湯為最宜若或稍有火毒原方減肉桂加金銀花蒲公英遠志肉紹酒煎日服三煎自安産後流注産後惡露流注於腎腰關節之處或漫腫或結塊作痛久則腫起肢體倦怠急用蔥尉法以散外腫內服參歸生化湯以散血滯至已潰未潰其法參之乳癰症中蔥尉法用生蔥一握搗為餅貼患處加厚布三四層以炭火斗尉之立效此方又治癰疽初起參歸生化湯人參二錢當歸三錢川芎黃耆各一錢半肉桂八分研甘草五分白芷一錢半五香餅灸法公丁香木香沉香肉桂各一錢麝香五分上五味共為細末五香餅灸流注法以五香末用米湯為餅先以大蒜泥鋪初起之患處以五香餅放蒜泥上用艾火球灸在餅上痛者灸至不痛而癢則止癢者灸至痛則止如不痛不癢者灸至皮肉融洽為度多灸一二次為貴毒自散矣若灸陰毒無名腫痛風毒原方加白芷紫蘇薑黃血竭花各五分同和為餅灸法同流注産門腫痛臨産用力過多以致戶門兩旁腫痛手足不能舒伸者用四季蔥即芽蔥入乳香末搗成餅貼腫痛處良久即愈陰門突出臨産用力逼送陰門突出者四物湯加龍骨少許連進二服外用如聖膏貼頂少收即拭去龍骨四物湯龍骨一錢熟地四錢全當歸四錢白芍四錢酒炒川芎二錢如聖膏又名收線子乳膏方見臨産胎衣不下門又見諸異症門産後陰癢陰門發癢者乃産後脾胃不和氣血不調宗氣下陷濕熱下逼陰中因之而生蟲其癢者乃蟲咬陰戶也治宜加減補中益氣湯外用薰洗貼法加減補中益氣湯黃耆人參各錢半當歸身甘草炙白朮土炒各一錢陳皮五分升麻三分川椒二十粒烏梅三個吳茱萸三分用川黃連同炒生薑三片大棗三個燒外用薰洗法蛇床子一兩炒研川椒三錢蔥白五寸苦參五錢熟艾葉三錢煎湯取汁盆中先熏後洗若薰洗不效連用三四次如再不愈用椿白蛇床方或用豬肝貼法即愈又方椿白皮四錢蛇床子四錢煎水薰洗其癢自止外用貼法豬肝一頁回族以羊肝代之竹刀切一分厚之片用芝麻油搽過放新瓦上用火炙之至熱氣香時乘熱即貼陰門癢處冷再換之換三次即愈用時先洗後貼又方用小雞一隻剖開去毛去臟腑煮熟用滾醋烹透貼癢處即愈陰門生瘡陰門生瘡亦下陷濕熱所致宜服加味補益敗毒散加味補益敗毒散生黃耆人參各二錢白朮一錢土炒甘草八分炙陳皮一錢當歸身二錢升麻五分荊芥一錢銀柴胡一錢肉桂五分研乳香一錢防風一錢外治熏洗方金銀花甘草元參土茯苓蒼朮炒霜桑葉白芷苦參蔥白蒜梗川椒各等份槐枝五寸水煎薰洗加昧三仙丹原方列本門之末三仙丹底加大黃黃連各一錢象皮二錢無名異一錢輕粉五分冰片一分樟腦五分研調煅甘石黃柏各二錢共為細末摻瘡如干用豬膽汁和芝麻油調搽之甚效本草備要治金瘡折傷癰疽腫毒醋磨塗止痛生肌人受杖時須服三五錢不甚痛傷生川廣小黑石子也升樟腦法樟片一兩薄荷葉一兩鮮好磁碗二個將薄荷葉鋪一碗內鋪均將樟片放在薄荷上用一碗蓋之以竹紙封口二三重勿冷泄氣用木炭火緩緩燉三炷香為度止火待碗冷開碗上蓋碗上之霜即樟腦也升三仙丹水銀輕粉研火硝研各一兩拌均入一大傾銀罐內上以小罐蓋之用鹽泥封固以木炭火煅至三炷香為度取出冷定蓋上霜為丹頭底下為丹底拔毒用丹底收口用丹頭凡各瘡毒摻藥俱奇效一方火硝白礬用小鍋一口將藥入內蓋一磁碗亦可升丹乳汁不通附孕四年産子缺乳産後乳汁不通其故有二一由氣血兩虛乳汁稀少一由氣閉血滯壅塞不行蓋婦人多優思忿怒憂思則氣結而血亦結忿怒則氣逆而血亦逆甚至乳硬管塞脅痛煩熱故古方於通乳藥中多用香附木香青皮者以行氣故也用玉不留通乳而兼行也惟由氣血虛弱則不用利氣之藥須服豬蹄湯公雞飲鍾乳飲等方以年紀大小壯弱酌用之豬蹄湯此方純補四十歲後氣虧血虛者宜之兼滯公雞飲豬前蹄一對用公豬擇過的糯米一斤生黃耆一兩西黨參一兩通草五錢先將藥煎汁去渣將藥汁入大砂鍋內再入豬蹄糯米用河水楊木火煮爛飲之食之效甚公雞飲此方半行半補三十歲後氣血虛者有滯宜之大白公雞一隻去毛臟西黨參一兩黃耆一兩穿山甲三錢炒銖王不留三錢炒先煎藥汁一碗去渣再與長流水數碗煮雞飲食之乳汁自通鍾乳飲鍾乳粉二錢漏蘆三錢水煎服鯽魚飲鯽魚半斤木通五錢水煎服大豬蹄湯七星豬蹄一隻當歸五錢熟地六錢人參二錢川芎一錢半通草一錢枸杞三錢黃耆三錢炙先煮豬蹄濃汁以蹄汁煎藥服之凡乳汁不通皆由氣血不足之故如人稍壯氣閉則加王不留行一錢炒化滯通乳湯此方新産年少氣血盛閉者宜香附二錢酒炒木香一錢研陳皮一錢炒胡蘆巴一錢炒研通草一錢穿山甲一錢炒銖王不留二錢炒皂角刺一錢川芎一錢懷孕四年産子缺乳余故里有戶婦人者懷孕四年産一子其間均以為病用行滯消脹等藥皆不效至臨産前十日延余診治其脈左尺滑實而數余曰是喜也非病也將臨産矣因用耗氣藥太多余以六君子救之服二劑而産一子因體虛缺乳用十全大補湯五劑大豬蹄湯二劑乃復其元乳亦流矣余悅曰幸而有夫若是寡婦何處洗冤聞者皆奇之六君子湯見卷三産後膨脹門十全大補湯見本卷産後乳癰乳疽門大豬蹄湯見本門第五方按上症前醫誤為癥瘕用破藥百餘劑産一男子全體決然無恙莫非天賜其子乎其子毛髮指甲皆長於普通赤子三四倍滿月扎小辮四月能步行非常頗實一旦謂宗嶽曰爾開診後遇寡婦患此當以為標而救之不獨此案然古人亦有之詳見濟陰綱目消乳産後無子飲乳有乳而欲消者以麥芽一兩炒末四物湯調服即消或用神麯二錢炒末紹酒調服日用一次産後諸異症下物如鉢産後陰中下一物如鉢狀有二歧者乃子宮也用補中益氣湯去柴胡連進二三劑一響而收後以四物湯加人參調理白芍終須少用至七日外另行斟酌下物如帕産後陰中下一物如帕約重斤余者因臨産勞役或肝痿所致又有黏席不上者則系脂膜無妨治法同鉢症下物如茄産後陰中下一物如茄蓋兒袋也名曰茄症由産時用力過多元氣下陷之故治宜補中益氣湯以升提之自然漸退補中益氣湯方見卷一胎前子滿門鉢症帕症茄症皆宜之下肉線産後倉遑驚擾用力過多以致育膜有傷垂出肉線一條約長一二尺牽引心腹痛不可忍以手微動之則痛苦欲絶宜先服失笑散數劑再用生薑三斤搗爛以清油二斤拌均炒令油於焦為度即用熟絹五尺折作數層令穩婆輕手盛起肉線使屈曲一圈納陰戶口用絹袋兜前油薑稍溫敷在肉線上熏之薑冷則以木炭火尉熱使常有薑氣如薑氣已過又用薑照前制度熏一日一夜其線即縮入一半二日縮盡再用芎歸湯調理萬不可使肉線斷作兩截一斷則不治矣失笑散蒲黃五靈脂各二錢共研末醋調服芎歸湯川芎一錢當歸二錢補中益氣湯去柴胡重用黃耆産後下物各症服之皆效方見胎前子滿門服之線不收者貼子乳膏自效收線子乳膏又名如聖膏正方見胎衣不下門萆麻子肉一兩滴乳香五錢去油研為膏攤布上貼頭頂心所下之肉線即收盤腸下生者貼之腸自收凡用此方腸以已收矣即去膏貼肉線者亦然乳懸産後瘀血上攻忽兩乳伸長細小如腸直過小腹痛不可忍名曰乳懸用川芎當歸各一斤水煎濃汁不時溫服再用芎歸二斤燒煙於病床前令病人曲身低頭將口鼻及患乳常吸煙氣則瘀血消而乳復舊矣若收不復舊再用一料即愈或以收線子乳膏貼之乳收膏去遲遲有損收線子乳膏見下肉線門即上案末方陰挺下脫産後平常皆有之産後陰中下精肉一塊如菌或如雞冠約長寸許甚至有滿尺者名陰挺下脫即平常婦人皆有之總因元氣下陷所致治法與茄症相似用補中益氣湯産婦減柴胡平婦用原方以內有升麻提脾氣而症自愈矣補中益氣湯方見子滿門産後癰疽並內外腸癰産後癰疽此由氣衰血阻營衛不調經絡不行瘀而為毒甚則發為內外腸癰外腸癰不易治內腸癰更難療稍有不善必致穿腸爛肚無可救矣宜服加味十全大補湯內腸癰腫痛當臍必硬外用灸法內用托補方如肚腹脹痛者內腸癰是也內托方加味十全大補湯黃耆五錢生人參一錢白朮土炒茯苓遠志肉甘草水炒金銀花炒各二錢甘草炙白芍酒炒白芷肉桂防風各一錢當歸三錢川芎一錢半熟地六錢此方宜用之疽症或他癰症産後未滿一月時方中加益母草三錢紹酒一盅腸癰去白芷加荊芥一錢去防風加毛慈姑二錢如毒已久將成膿加皂角針一錢蘆薈一錢瓜蔞皮一個蔥白三寸杏圃問曰外腸癰眼藥後內毒已消往往有寒毒結如雞腸者何也淑濂子曰因內托藥力已到毒必從臍出矣牢不可斷不可疑為人腸也用太乙膏蓋之自退下內腸癰若潰必從大便瀉膿血也用太乙膏作丸服之自愈千金活命丹孫思邈方黃耆四錢生人參一錢漢附子二錢鱉蝨小胡麻當歸身各二錢白朮二錢土炒肉桂一錢研蒺藜炒茯苓甘草炙毛慈姑乳香去油沒藥去油各二錢何首烏四錢法制文蛤粉白芷各一錢荊芥一錢半外灸法凡癰疽初起紅腫者陽毒也易治平凹硬結不痛頭如米粟者陰毒也難療三辛附子片此方灸陰毒漢附子生用一片放患處用生蔥薑蒜搗為泥置附子片上再用大艾壯置泥上燃艾灸之或十四壯二十一壯灸後能散更好如爛則用塗法塗法塗癰疽用山上陳牛糞搗末芝麻油調塗之或蔥白三寸蜂蜜一兩保安萬靈丹三錢搗塗方見卷三癱瘓門忌用涼藥塗致毒內攻禍不旋踵涼藥者塗陽毒症也平時癰塗宜涼藥如藍葉或公英或馬齒莧搗塗皆效太乙膏醫宗金鑑方內癰外瘡俱用之分量按症酌宜用之元參赤芍白芷當歸各二兩柳枝槐枝各一百寸肉桂二兩沒藥三錢大黃二兩木鱉二兩輕粉四錢研不見星生地一兩阿魏三錢黃丹四十兩水飛乳香五錢血餘一兩真芝麻油五斤上藥十六味子留下黃丹其餘入油煎焦去渣熬至將油滴水成珠下丹收膏入水中聽用産後狐惑産後狐惑症乃外感傷寒邪傳入里寒變為熱里有不清則濕熱結為陰毒流注大腸清陽不升濁陰不降濕熱鬱久生蟲漸蝕肛門萬難救一蓋産後氣血虧又兼外感所謂兩感症也忌用柴胡山梔黃芩川連知母黃柏丹皮涼瀉等藥遏郁寒邪謂之引賊入院宜十全大補或補中益氣加減治之人參斷不可少也十全大補湯見本卷産後乳癰乳疽門補中益氣湯見卷一胎前子滿門此處用上二方內加文蛤二錢粉大胡麻四錢炒研産後脫肛産後脫肛宗氣下陷非大補不可治宜加味益氣湯加味益氣湯人參一錢茯苓黃耆炙白朮土炒甘草菟絲餅各五錢熟地八錢淡附子五錢歸身四錢升麻七分川芎一錢五山萸肉四錢桂心一錢研煨生薑一錢大黑豆四十九粒龍眼肉一枚脫肛外治法鱉頭膏鱉頭一個煨荊芥三錢共為細末蜂蜜調為稀膏塗肛門上用陳草鞋一隻烤熱緩緩托上鞋冷再烤敷肛門連三四次自愈三豆膏此方亦治痔瘡大黑豆緑豆赤小豆各一錢枯礬五分共為末蜜調塗肛門用溫草鞋托上即愈産後頭風鼻淵産後頭風皆由氣虛血弱督脈不通於腦任脈不交於腦而髓海空虛風寒乘入所致積久則鼻流黃涕稠黏腥臭腦痛如破頭痛如畏風不可作風治照古書所言治風先治血血活風自滅之意治産後更當治血治氣蓋氣足自能生血也況頭為諸陽之會則補陽又不可缺法當腎氣大補湯加減治之加減腎氣大補湯熟地萸肉山藥炒漢附子制黃耆炙當歸身甘枸杞菟絲餅各四錢茯苓三錢丹皮澤瀉肉桂研川牛膝各二錢巔痛原方加川芎一錢藁本五分細辛七分童便一盅沖兩太陽穴痛原方加荊芥防風各一錢淫羊藿二錢童便一盅牽引眼痛原方加殭蠶炒威靈仙蟬蛻各一錢面上起塊如餅原方加蠍子梢八分海桐皮一錢五石決明二錢煅乾蟾蜍一支面上紅腫如遊風原方加白頭翁牛蒡子各二錢獨活羌活各一錢地丁二錢黃花眼珠紅沿出淚原方加穀精草一錢霜桑葉十片炙乾蟾蜍一隻香油炙酥研為末以藥汁沖服見火無功補血湯黃耆二錢炙當歸身三錢甘草一錢炙獨芥散荊芥二錢研磨煮大黑豆汁調服獨萍散浮萍草三錢研末煮黑大豆汁調服産總後三方三消丸消死血套積痰結烏金散治産後十八症濟坤丹治産後氣疼瘀痛一一如下三消丸又名化堅丸治婦人死血套積痰結塊痛等症無不神效吳茱萸四錢川黃連一錢益智仁一錢萊蔔子一兩炒川芎桃仁梔子炒黑麥麩神麯炒三稜文術醋炒各五錢山楂香附童便炒各一兩先將吳茱萸煎汁浸黃連待浸透炒乾一半下半再同益智仁炒乾去益智仁炒乾去益智仁同下十味為末蜜丸桐子大空心服每用五十丸補中益氣湯送下或每服四十丸白朮二錢炒當歸三錢陳皮一錢引補中益氣湯見卷一子滿門烏金散治産後十八症一産難十失音不語二胎衣不下十一血邪癲狂言語三死胎不下十二心腹痛四眼花十三百節痠痛五口乾心悶十四舌乾津枯鼻中出血繞頂生瘡六寒熱如瘧十五腰痛如角弓七咳嗽寒熱不定十六小便短縮八敗血入肝十七喉如蟬聲九敗血入四肢浮腫十八胸膈氣滿喘逆不食烏金子即黑大豆紫威即凌霄花大薊根當歸肉桂研血餘無病之人發灰蒲黃炒黑木香赤芍牙皂角炒黑蠶脫紙燒存性棕皮炭炒盡各五分紅花一兩川烏一枚生用五分辰砂血竭花各少許上除燒灰者以外另研細末灰藥末和勻每服一錢生薑湯酒送下甚至一日三劑濟坤奪命丹即回生至寶丹功同烏金散取效更速但過於峻非萬不得已不宜用之濟坤奪命丹有古方濟坤丹見産後上惡露門此方一名回生至寶丹惡露不下陳陳作疼中痞心胃疼腰腹疼瘀血疼兒枕疼小便不利疼氣不和風寒等症用之皆效乳香炒去油沒藥炒黑各三錢麝香三分木香六錢熟地蒲黃桃仁牛膝當歸川芎各一兩三稜酒白芍羌活橘紅萸肉五靈脂各五錢青皮良薑香附元胡蒼朮炒坤草各一兩天葵子甘草各五錢烏藥一兩五錢大黃一斤研末蘇木三兩大黑豆一斤紅花三兩炒上先將前四味為細末再將後二十一味為末和勻再將大黃末入醋三斤煮乾再將蘇木大黑豆用河水煮汁再將紅花用南酒煮汁然後將蘇豆紅汁入大黃內曬乾與前藥共為末煉蜜為丸如彈子大重五錢每服一丸或二丸旦夕用南酒送下以上三方俱治標之藥若可稍緩仍當以大補為本即萬不得已而用之只可二丸隨迸補劑不然取快一時非無速效禍不旋踵悔無及矣胎産應備藥品凡胎産藥品必選地道必得炮製萬一不善藥反有礙謹列於下熟地以河南淮寧産乾地黃大塊者十斤生薑四斤取汁益智仁四兩揀砂仁四兩均研末紹酒二斤與薑汁二仁末同拌地黃內日曬令汁水皆歸地黃中以得陽氣再加紹酒四兩拌九蒸九曬再用牛乳一兩拌其中收磁器內聽用當歸以甘肅秦安産者佳泄瀉用陳壁淨土調水浸炒乾余方用南酒或醋炒或生用土炒止瀉酒炒散瘀醋炒斂汗生用生血川芎酒炒余方生用個大香甚者佳白芍酒炒一概不可生用以杭州産者佳大者美人參人參以長白山野産為最好其山人養者次之山鄰高麗産者尤次之其價皆昂貧寒之人無財力者以潞黨參加二倍代之必用生薑汁粳米拌蒸再略炒總不及人參力久人參為末吞下再服藥為最宜黨參有潞黨東黨之別性大同少用則逆多用則順亦酌宜用之白朮陳黃土炒若咽乾發燥用人乳汁炒於白朮亦然蒼朮術者古人無分白蒼於三種乃後人細推而分之白補蒼滲有燥痞於朮兼功而潤而順因於術價昂貧寒之人乃以蒼白代之蒼米泔炒茯苓人乳汁拌蒸白上赤下茯神中守廣産者為上野産者更好茯神以抱木者即茯苓心治怔忡盜汗驚悸用豬心血拌蒸炒或硃砂拌甘草去皮蜜炙若遇中滿脹悶等症嗜酒之人忌用虛症莫缺産汾州者佳黃耆胎前生用産後酒炒勿用蜜炙性過滑潤也産北口者佳邊桂去粗皮曰肉桂靠骨處去茸皮曰桂心單取心薄片入藥鍋煎一沸即止凡香味久煎減功如丁香沉香等味皆畏火宜研末沖服功大産安南者佳産廣州者亦佳紅花真西藏紅花細長絲每用只可二三分人造花與魯豫花同功西藏花一分頂魯豫花一錢吳茱萸用止腹痛以黃連汁炒用去寒滯單用湯泡五次可也曬乾鹽水炒以黑灰色淨豆者佳延胡索又名玄胡又名元胡堅肥者佳五靈脂糖者佳良薑肥者佳蘄艾此四味俱用醋炒貢阿膠鹿角膠龜板膠此三味治失血薄黃炒嗽蛤粉炒余方生用皆細亮不醒而味清者佳淫羊藿鹿茸馬鹿茸以肥短輕嫩者為上細小者否皆羊酥炙枸杞補陰藥則青鹽水炒或黑芝麻炒補陽藥用小茴香胡蘆巴川椒拌炒皆可以甘肅産者佳益智仁胡蘆巴小茴香蒺藜此四味俱鹽水炒川杜仲鹽水炒或薑汁炒皆將杜仲炒斷絲存性益母草又名坤草為産後去瘀生血之聖藥按瘀血多少酌宜用之枳殼麥麩子炒老黃色肥白者佳大黃産四川又名川軍有錦紋者佳熱症酒炒痢積韭菜汁拌蒸九蒸九曬至於傷寒溫疫陽症中生用黃連吳茱萸汁炒遇熱症酒炒嘔吐生薑汁炒肥大者佳産四川乾薑用止血破瘀則以醋炒黑其餘微炒或生用肥白者佳知母黃柏皆鹽水炒上焦有疾則酒炒其餘生用肥者佳黃芩北口産者不枯色鮮佳丹皮産毫州香而肥者佳山藥産淮寧堅者佳皆酒炒山萸肉治脹症用醋炒其餘生用何首烏無論男女老少久用諸病皆已以泰山特産為佳入藥生用單食去皮煮爛用之或為末入米粥飲之皆可行醫規則及辨症蓋行醫者以求人生而除痛苦為任勿為已便而救富貴為懷如此診婦女更進一禮凡長我者作母當視之平我者作姐妹視之晚我者作女侄視之男女之有別吾儒之必要若診尼僧營妓之病當正顏端坐命方即退勿輕己身也可及診寡婦處女多留心焉尺滑實數之脈或辭或救邪言不可出口尺實有力不動者確是癥瘕用加減四物湯有驗加減四物湯川芎當歸白芍丹參蘇木紅花上邊桂枳實檳榔酌宜用之洗冤録云凡寡婦處女腹內癥瘕結塊自下多似胎孕則疑似難明須知胎孕必有衣膜癥瘕只是血塊其或成形如鱉如蛇等則受異氣所致有結成鬼胎者此不可不辨又有血盛思念成胎者及用男子溺器成胎者是二者皆生子無骨或有亦軟尤宜辨之
