暈痰壅將危凡妊娠頭旋目昏腮項腫硬此因胎氣有傷熱毒上攻太陽沉痛欲嘔背項拘急致令眼暈生花若再痰壅危在片時急以消風散治之消風散雨前茶甘菊花羌活石膏煅研全當歸川芎羚羊角白芷荊芥防風各一錢甘草八分生薑二片兩目不明腮頂腫滿凡妊娠將臨月忽然兩目不明燈火不見頭痛項腫不能轉頸此由常居火閣衣襟臥褥伏熱在內或服補藥熱物太過致令胎熱而肝臟壅極風熱上攻入腦故見此症急以天冬飲子治之大忌酒蒜炙油膩一切辛熱發物否則眼不復明矣天冬飲天冬荊芥各錢半全當歸川芎熟地黃白芍藥知母白茯苓各二錢人參六分五味子十五粒口北產防風一錢茺蔚子一錢炒研每日一劑病稍退二日一劑遍身刺痛喘滿筋攣凡妊娠遍身刺痛脹滿此由五臟不利血氣虛贏因食生冷或發熱憎寒唇白麵青筋脈拘攣骨節痠痛皮毛乾澀氣急上喘大便不通嘔吐頻頻此危症也急以平安散保之平安散厚朴姜炒陳橘皮各一錢熟地黃八分甘草六分川芎廣木香沖各五分生薑三片煨鹽五分水煎服因失血類中風凡妊娠因吐血衄血或被傷失血驀患口噤項背強直類中風症宜服加減安胎飲加減安胎飲人參白朮土炒麥門冬去心全當歸熟地黃天麻各二錢防風荊芥各一錢陳橘皮甘草各五分生薑三片或加川貝母一錢研天竺黃一錢心煩腹脹百節痠痛小便閉澀凡妊娠面赤干舌苦心煩腹脹百節痠疼小便不通此由恣意飲酒及食瓜果魚肉一切腥膻熱毒之故以歸涼節命飲治之歸涼節命飲苧根白芍藥全當歸川芎麥門冬去心各一錢白朮一錢五生揀砂仁炒研甘草六分紅殼米二錢蔥白二寸因中酒者加葛根一錢因積食者加山楂炒麥芽炒各一錢小便閉者加赤茯苓大腹皮各一錢半產凡妊娠月未足而半產者由氣血虛弱臟腑皆虛加以病患相感情欲相擾以致精血攻衝侵損營衛而胎無所養與枯枝落葉無異如既墮以生化湯加減治之未墮而血行腰痛急以十聖散速進數貼或阿膠補血湯或保生無憂散皆無不效十聖散人參黃耆各二錢全當歸白芍藥川芎白朮土炒各一錢熟地黃一錢揀砂仁五分炒研川斷七分甘草三分生薑一片大棗一枚炒食遠服忌惱怒生冷辛熱之物如腎不足加枸杞一錢五分杜仲炭二錢阿膠補血湯阿膠白芍藥川芎白朮土炒杜仲炒炭黃耆人參五味子廣木香沖各一錢甘草八分生薑一片大棗二枚炒保生無憂散半產一症將此散一日二貼連服七八劑更妙方詳見胎漏下血門腹中兒啼凡妊娠臨月或九個月腹中兒啼者緣兒在母腹口含臍帶隨母呼吸妊母或將手搬高取物提出兒口臍帶故鳴但令其母如男子作輯使臍帶仍入兒口即不啼矣或煎黃連濃汁呷之或用九枚錢置地上令其母一步一個拾之皆效轉脬披交切音泡膀胱也凡妊娠將足月脬為胎壓轉在一邊以致臍下急痛小便不通但升舉其胎脬仍還舊處而水道自通宜六君四物湯去茯苓探吐以提之不宜專用滑滲之藥產後亦有此症搗蔥白鋪於臍上炙之立效六君四物湯陳皮一錢去白半夏二錢炒人參白朮土炒甘草各五分生地二錢白芍酒炒川芎各一錢半當歸四錢酒浸乳吹凡妊娠胎前兩乳硬腫疼痛寒熱併發者此名內吹乃督任不通經絡不和寒束毛竅氣閉血滯乳管阻塞治宜加減無憂散或鹿角酒或腐皮散遠志酒等方治之甚效加減無憂散生黃耆三錢全當歸二錢川芎一錢冤絲餅二錢厚朴八分姜炒枳殼一錢麩炒羌活七分荊芥穗一錢川貝母一錢生甘草一錢研遠志肉一錢五炒去心蒲公英一錢五生薑二片服後飲紹酒一杯腫甚者原方加鹿角屑五分金銀花一錢鹿角酒以鹿角屑五錢紹酒四兩和水煎服腐皮散以豆腐皮一兩帶色制焦乾研末紹酒二兩沖服若無紹酒以黃酒代之遠志酒以遠志肉二兩紹酒二兩河水一大碗煎服作三次四次服之服後再用遠志渣灸注之遠志灸法以前遠志渣搗爛鋪乳硬處再用蔥白三寸生薑四錢搗爛和食鹽少許鋪遠志上用艾灸注七大壯重者用青黃散治之青黃散青皮二錢醋炒麻黃三錢共為末紹酒調服此方三次用之夏月忌按乳吹一症有內外之別上列六方皆治內吹內吹者胎前症也產後患此名曰外吹若治外吹即可照第三方用之無不神效不宜服瘦胎方辨凡妊娠臨產艱難者大率由口饜肥甘身耽安逸既飽即臥遂令胎胞肥厚行動氣急以致臨盆難產宜於胎將足十月之時時時動作勿食肥鮮勿貪坐臥勤行勤走此即不藥滑胎之妙方也乃世醫咸謂安胎之後必須更進滑胎藥始為合宜豈知滑胎名目昔人原為湖陽公主而設蓋以貴家居養豐逸身體肥盛誠恐軀脂凝結胞系堅固特藉此以蕩其肥滯耳若平常婦人一母之氣血分蔭其胎尚虞不敷復加無憂易產名目一概施之是猶窶人而復遭削奪其能勝此乎然恐後人疑為未備特詳錄二方以為體肥稟厚者採擇湖陽公主每產累日不下南山道人進以滑胎枳殼散用枳殼二兩炙甘草二兩共為末每服二錢滾白水送下一日三服殊效蓋為壯實者立法也無憂散乳香一錢去油白芍藥一錢二分炒枳殼二錢全當歸二錢麥門冬一錢去心血餘二分炒神麯一錢炒陳橘皮八分廣木香三分沖訶子二枚炒去核甘草八分易產湯乾地黃川芎全當歸大腹皮陳皮甘草生白朮生益母草各等份胎前禁藥歌紅斑水蛭及虻蟲烏頭附子與天雄野葛水銀共巴豆牛膝薏苡並蜈蚣三稜莪朮芫花麝大載甘遂黃雌雄代赭芒硝牡丹桂槐花牽牛皂角同半夏南星及通草瞿麥乾薑桃仁通硇砂乾漆蟹甲爪地膽牙硝是禁中附增異症並方腹內鐘鳴腹內作鐘鳴或哭者用多年空房內鼠穴中土為末黃酒送下或干噙之即止慘慼嘔吐有臟臊悲傷慘慼嘔吐者大麥芽甘草大棗水煎服哭笑有自哭自笑者紅大棗燒存性米湯送下妊娠生痘妊娠患痘無從用安胎補劑若用攻藥必致去血泄氣立危之症也不必服藥或曰若慮攻藥去血泄氣立危而火毒內攻獨不立危乎是在按症輕重以為消息不必拘泥於妊娠患痘之不可攻之必攻也故曰按症輕重以為消息可攻則攻可和則和可守則守者是也胎形附收胎飲二驗胎方一安胎方一人胎之形一月如露珠二月如桃花三月分男女四月形像具五月骨節成六月毛髮生七月動右手是男於母左是女於母右八月動左手是男於母右是女於母左九月三轉身十月始滿足生生收胎飲此方治血熱有瘀不收胎屢用屢驗之妙方也生丹參生地黃各五錢水沖代茶三付收胎參參收胎飲此方治婦人氣血虛弱而有瘀血期忽前忽後不收胎者用之或一劑數劑血色以正則胎收百發百中大潞參五錢炒丹參五錢大熟地五錢揀砂仁五分艾葉驗胎湯艾葉三分醋炒研末白水沖服稍時腹疼即胎也急服六君安胎飲為善否則恐有不安也六君安胎飲陳皮半夏川斷杜仲炭各一錢人參白朮土炒茯苓甘草各一錢五分高氏胎產方案卷一終附禁忌所宜各一則妊娠禁忌怒氣惡暴不孝不賢一切犯上之事及隨便食飲腥葷隨便語言是非如此不禁不止生子凶惡奸盜非善即為妊娠所宜孝順翁姑父母賢惠夫主和睦妯娌慈愛小叔小姑一切少小者恭敬長上者聽讀書聲聞善言視山水觀善事言仁義坐立端正飲食清潔遵此所囑產子聰明正直忠孝仁義
