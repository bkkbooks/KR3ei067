body:
  text: 高氏胎產方案卷一胎前總論凡孕婦脾胃健旺氣血充足則胎安產順毋庸用藥調理惟稟賦不足而氣血衰脾胃弱勞役過以致諸症百出不得不資藥力矣昔丹溪定補母安胎之方以補氣血為主以順氣清涼為佐參朮黃芩為安胎之聖藥芎歸熟地為補血之良劑加以蘇陳等定為常主方至胎成六月茯苓性降不宜多用黃耆肥胎不可常加香附雖快氣疏肝過則耗氣無補砂仁能止嘔定痛多亦動血行胎此誠先賢之法戒後學之準繩也而猶以為未備因分晰胎前諸症擬成數十餘方以便臨期酌用胎前脈法婦人有孕陰搏陽別脈以寸為陽以尺為陰尺脈搏指而動與寸回然分別者此孕成之候也少陰獨動其胎已結少陰心脈也心主血今心脈往來流利而獨動乃血旺成胎之象故可知其有孕又曰動者如豆粒之逼指而動也滑疾不散胎必三月疾即數之有餘也金鑑云六至為數七至疾是也不散者按之愈有力而不散也其胎必三月矣弦疾不散五月可決滑脈如珠流行弦脈端直且硬滑而疾胎三月弦而疾胎五月可決矣孕一二月滑而數三四月滑而疾五月之後皆弦而疾但日愈久而脈力愈大蓋三五七之月為陽與他異常總之按而不散者為有力故斷之為胎亦間有損症似此者須細辨之左疾為男右疾為女女腹如箕男腹如釜三部之脈浮沉正等無他症而月經不通者乃有孕也三部之脈浮沉正相等是無病之脈也又何以不月既已不月者是有病之驗也又何以無他病故脈雖不顯而受孕可知脈沉實為男沉實為坎中滿屬真陽也浮虛為女浮虛為離中虛屬真陰也左手沉實為男右手浮虛為女兩手沉實為雙男兩手浮虛為雙女一手沉實一手浮虛不拘左右為一男一女也惡阻凡妊娠一二月惡阻嘔逆煩悶嗜臥即俗所謂病兒也此由婦人本元虛弱平時喜怒不節寒暑不調中脘夙有停痰積飲受孕經閉飲食相搏氣不宣通以致心下煩悶頭眩眼花四肢倦怠聞食即吐喜酸嗜鮮多臥少起甚至嘔逆不食法當順氣理血豁痰導水而諸症自除以加味參橘飲治之加味參橘飲人參一錢白朮二錢土炒砂仁二分圓粒炒研厚朴一錢姜炒橘紅四分當歸一錢香附五分炒研甘草三分竹茹五分生薑三片若無財力服人參以黨參加五倍換之嘔過甚者再加半夏曲八分水煎食遠溫服韓梅村曰以後凡不注字者皆是水煎服胎動不安凡妊娠二三月胎動不安者蓋因子宮久虛氣血兩弱不能攝元養胎至令不安欲墮急服安胎飲以保之若先經墮過者可先服大造丸繼杜仲丸庶無半產之患湯氏云半產多在三五七個月如前次在幾個月墮者後必如期復然故當追算前三個月墮者即於未墮半月前先服清熱養血固胎之藥數帖以補其虛五月七月墜者亦於未墜者半月前預先服藥方保平安此據受孕後夾熱者而言蓋三五七系陽月緣火能銷鑠故也安胎飲人參一錢當歸二錢熟地黃三錢條黃芩一錢川芎三分白朮二錢土炒陳皮四分全紫蘇四分甘草四分大棗二枚燒如虛肥人陳皮去白加川黃連五分如脾胃溏瀉加蓮子十粒砂仁五分去熟地黃黃芩怒而多瀉加木香三分渴加麥冬二錢去心怔忡驚悸加酸棗仁二錢炒見火色益智仁一錢炒龍眼肉十枚以上五條皆按病各將原方加減之梅村曰凡用潞黨參代人參者當加一分之五大造丸紫河車一具泔水洗淨炙酥枸杞果一兩人參一兩五錢全當歸二兩麥門冬一兩三錢一兩天門冬一兩益智仁一兩炒白茯苓二兩五味子五錢熟地黃二錢姜炒川牛膝五錢山藥八錢炒菟絲子四兩鹽炒川貝母一兩鹽水炒上十四味共為末煉蜜為丸如桐子大滾白水送下每服五十丸旦夕用杜仲丸杜仲姜炒炭川斷酒浸各一兩為末煉蜜為丸如桐子大米湯送下每服六十丸食遠用胎動腹痛凡妊娠胎動腹痛者或因飲食冷熱及動風毒物或因交感搖動骨節傷犯胞胎或因服藥太過血氣不調所致宜服順氣補血之藥如加味安始飲或如聖散皆可加味安胎飲人參黃芩當歸麥冬去心砂仁炒研熟地各二錢陳皮紫蘇各二分生白朮一錢五分甘草三分大棗二枚燒生薑三片上方凡妊娠元氣不足精神倦怠胎動不安或身體微熱者皆宜服之必一日二服方可平安如腹痛去麥冬加蘄艾七分炒炭或再加四制香附各二分半如咽燥多痰兼失血者加川貝母一錢半荊芥炭一錢艾毓學先生曰凡治痛先通氣不獨婦科然諸症皆然古人所謂痛則不通通則不痛是也惟妊娠通氣先固氣勿令損胎如聖散鯉魚皮阿膠當歸川斷各二錢熟地黃三錢白芍藥一錢川芎一錢甘草六分苧根五分生薑五片引空心服胎漏下血凡妊娠胎漏經血妄行此是胎息未實或因勞役過度傷動胞胎或因房事驚觸致令子宮虛滑經血淋漓若不急治日漸胎乾子母不保急服寄生散或參歸飲或阿膠濟陰湯或保生無憂散寄生散桑寄生川斷阿膠香附炒黑人參白朮土炒各等份生薑五片引參歸飲人參全當歸桑寄生生地黃即乾地熟地黃條黃芩香附炒研茯苓阿膠各二錢川芎二分甘草五分生用白芍藥二分黃耆一錢半黃楊葉三片生薑三片上十五味水煎溫服甚者日進一劑韓梅村曰此方若以黨參代人參當用黨參六錢阿膠濟陰湯阿膠四錢白朮一錢土炒生地黃一錢乾用白芍藥一錢半全當歸一錢半川芎二分原砂仁五分研條黃芩二錢蘄艾五分炒黑香附一錢炒研甘草五分炙黏米一撮水二湯碗煎至一碗溫服如下血塊加地榆炭腰痛加杜仲炭觸患胞胎加金銀花須一晝一夜三服以防敗血攻心如血不止加續斷二錢荊芥炭一錢半黑大豆四十九粒如因傷瘀而痛甚者加桂心三分或四分保生無憂散黃耆二錢半生用當歸身一錢酒炒川芎一錢甘草一分生用菟絲餅二錢羌活四分川樸一錢枳殼六分炒蘄艾三分醋炒荊芥穗一錢川貝母一錢白芍藥一錢酒炒水煎服如不見血加生薑二片上方或臨月或小產不能固胎時服之催生保母胎若能固或服前首一二方或服加味六君子方保子母兩全加味六君子湯人參一錢貧人以黨參六錢代之白朮二錢土炒茯神四錢抱木上辰砂二分拌陳橘皮一錢半夏片姜炒三錢揀砂仁一錢炒研乾地炭三錢存性棕皮炭二錢炒燼蒲黃炭三錢炒燼阿膠珠三錢蛤粉炒珠甘草二錢炙蓮子房一枚炒上十二味水煎溫服如腹痛加醋炒香附二錢如血不止再加荊芥炭二錢炒燼地榆炭三錢炒燼如腹痛甚血不止加醋炒當歸三錢醋炒五靈脂三錢醋炒白芍藥三錢臨症量酌加減不致失誤漏胎凡受孕之後經血不時點滴謂之漏胎蓋因勞傷氣血虛弱之故或因惱怒或食炙熱物所致宜補中安胎飲補中安胎飲條黃芩三錢白朮三錢土炒人參三錢或黨參一兩代之熟地黃三錢全當歸三錢白芍藥三錢酒炒生甘草六分紫蘇梗引水煎服跌僕動胎凡妊娠跌僕動胎下血不止急服安胎參蘇飲安胎參蘇飲人參三錢蘄艾二分炒黑川芎二分全當歸一錢條黃芩二錢生白朮二錢陳橘皮四分全紫蘇四分生甘草四分阿膠二錢研沖上十味水煎服有外感者加蔥白四寸腹痛者減蘄艾減川芎加揀砂仁四分炒研腰疼加川斷二錢杜仲二錢減黃芩小便帶血凡妊娠小便中帶血此由形體勞苦或過食煿炙之物所致宜清膀胱之火服加味逍遙散勞苦受寒四君續仲湯加味逍遙散白朮二錢土炒全當歸二錢炒柴胡一錢白芍藥一錢酒炒粉牡丹七分雲茯苓七分桅子七分炒研甘草八分生燈芯草七寸水煎服若血不止去當歸柴胡丹皮加黃芩炭三錢黃柏炭三錢棕皮炭二錢若血再不止或妊婦在三十餘歲之上下診其脈弱乃由勞苦受寒所傷血必在尿後宜服四君續仲湯四君續仲湯人參一錢白朮二錢土炒云茯神三錢甘草二錢蜜炙川斷三錢杜仲三錢鹽水炒炭存性子淋凡妊娠小便淋漓此由調攝失宜酒色過度傷損營衛致令子宮氣虛而然又或下焦有熱而閉塞者名曰子淋宜服安榮散或小單方若清涼通利不效宜補中益氣湯安榮散人參三錢麥門冬一兩去心通草一兩滑石粉一兩全當歸五錢細辛一錢燈芯草五錢甘草五錢共為細末每服四錢滾白水衝下又方桑螵蛸一味為末每服二錢空心江米湯送下又方陳倉大米煮爛濃取汁服之此方並治男子癃閉即小便不通症也按此子淋一症由飲食無忌熱積膀胱者居多楊氏用古芎歸湯加木通麥冬人參燈芯草甘草滑石治之如清涼通利等藥不效即用補中益氣湯加車前子二錢益氣一提則下竅自開況車前子利水通淋一提一降自然見效補中益氣湯見子滿門子腫凡妊娠面目虛浮四肢有水氣名曰子腫蓋由脾胃虛弱所致宜服全生白朮散或鯉魚湯全生白朮散人參一錢白朮二錢生茯苓皮八分甘草三分全當歸二錢川芎六分全紫蘇四分陳橘皮四分生薑兩片如不見消加蒲種殼三分或干浮萍一錢生薑皮三分並冬瓜子三錢鯉魚湯鯉魚二尾當歸五錢白朮五錢土炒白茯苓四錢陳皮二錢生薑七片上六味先將鯉魚過斤者兩尾若不足斤者三尾去鱗洗淨去臟以清水煮熟去魚用魚湯一碗半煎上之五味藥餌旦暮服之以愈為度上方以二尾鯉魚之湯能煎藥四五劑非一次同用也楊氏云子腫於五六個月時多有之或腹大高過心胸氣逆不安此由胎中蓄水所致若不早治必然生子殘疾子母難保常煮鯉魚粥食之最善鯉魚粥鯉魚一二大尾去鱗去臟洗淨煮爛去魚取湯合米作粥江米三兩苡米三兩共作爛粥食之子滿子氣同皺腳同凡妊娠腿膝浮腫腳面足指出水氣促滿悶此由脾虛血化為水所致名曰子滿又名子氣宜服加味天仙藤散如脾氣虛甚者宜服補中益氣湯加味天仙藤散天仙藤六分洗略炒木瓜一錢香附六分酒炒紫蘇子四分研陳橘皮四分烏藥七分甘草三分水煎服虛甚者加人參一錢全當歸二錢白朮二錢土炒補中益氣湯人參一錢五分黃耆一錢五分蜜炙甘草五分蜜炙白朮一錢土炒當歸身一錢陳橘皮七分柴胡三分升麻三分病甚者加川椒目車前子各一錢炒研水煎服按妊娠七八個月兩足浮腫者乃胞漿水濕下流之故其微腫者名曰皺腳得之易產其腫甚或出黃水者始服補中益氣湯凡妊娠胎氣不和上湊心胸滿痛難忍謂之子懸以紫蘇散治之或安胎順氣飲或蓮房酒治之紫蘇散紫蘇子研陳皮白朮大腹皮全當歸川芎各二錢人參甘草各一錢生薑五片蔥白五寸水煎空心服安胎順氣飲即前方去大腹皮加揀砂仁三粒炒研廣木香三分研蓮房酒西遙趙敦榮先生傳蓮房陳新各一枚炒黑研細黃酒送下按受孕至三五個月斯時相火養胎火盛胎熱則氣逆湊心多有此症子煩凡妊娠心驚膽怯煩悶不安名曰子煩宜服竹葉安胎飲竹葉安胎飲人參三分白朮土炒條黃芩全當歸各二錢酸棗仁八分炒遠志八分去心甘草水炒陳皮三分川芎七分生甘草四分生地一錢五分麥門冬一錢去心竹葉十片去尖生薑三片大棗二個燒夏陸山曰有痰原方加竹瀝一小瓶韓梅村曰虛甚人參加三倍瀉加芡實二錢炒研減生地按此症多在三五個月之時相火用事或因夏令君火大行俱能乘肺以致煩躁湯建中曰因君火者加黃連五分川產因相火者加知母二錢子嗽凡妊娠子嗽因外感風寒者參蘇飲去人參半夏加桑白皮杏仁因火乘肺金者二陳湯去半夏加芩連枳桔貝母痰而喘者加蔞仁前胡桑白皮如咳嗽吐血不止者用地黃飲如風壅相攻胸滿久嗽者用百合散加減參蘇飲因去人參加杏仁名曰蘇杏飲蘇葉杏仁制橘紅各一錢枳殼七分麩炒前胡八分廣木香三分桔梗七分葛根七分桑白皮七