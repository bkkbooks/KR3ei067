body:
  text: 保嬰全書附胎產方案後心亭問於杏圃曰幼科一門載之胎產篇末何也杏圃曰老師有言僅保嬰耳一月之後小兒百病自有專科司其責然新產七日內外調護失宜其家因醫治產後即乘便求救而概諉不能未免拂人之意非所以濟世也故並及於此保嬰要訣嬰兒初生不啼或肛門為脂皮所塞者用玉簪或金簪通開分臺秘訣云兒生不啼由產母少氣也取臍帶向身持之令氣人兒腹仍呵之百度自啼矣又以石菖蒲取汁滴兒口即活夢生濟陰綱目曰初生不能發聲為之夢生切不可斷臍須以棉包兒將胞連帶用大油紙燃烤其臍帶待兒能啼方斷可也拭口法小兒將降生備一清心湯待兒生下即灌二三匙再以上等硃砂末抹口中打盡腹中舊糞次用朱蜜膏抹口中不特鎮心安神亦能解除先天之惡毒葛氏云先以黃連甘草拭口使吐其惡汁稍定再以朱蜜膏抹口中此安心神而解惡毒之法也惟兒面色青白啼聲之響則不須服宜服甘桃汁用淨細線布包甘桃泥與兒吮之後以良善少婦乳哺繼之永無寒滯之患清心湯甘草三分去皮黃連二分研水煎濃汁灌兒口中繼令食乳或先以硃砂飛末半分抹兒口中稍頃乳哺之朱蜜膏硃砂取色紅如血透亮者半分飛淨蜂秋蜜五分煉好和硃砂末為膏抹兒口中繼以乳哺然兒面色青白啼聲不響者此等嬰兒先天軟弱黃連硃砂之類不宜用之當以甘桃汁為宜甘桃汁甘草八分煮汁胡桃一枚去殼去仁上薄皮搗為泥上方以甘草汁浸胡桃泥淨布包乳頭形與兒吮之繼以乳哺永無寒滯之虞斷臍法產後要訣兒出胎洗淨後方斷臍帶則不傷水濕無以致病斷臍須將汁持盡否則寒濕入腹或作臍風又須於近臍四五寸處以棉緊扎用棉包裹以口咬臍蓋緊扎則兒血不貫於胞衣自然痿縮不脹而易下則胞衣未下以此方治之雖延緩數日亦無大害斷臍不用剪刀自無冷氣內侵可免腹中吊痛之虞所留臍帶不可太長則難乾而傷肌肉且恐引外風為臍風然亦不可太短太短則逼內而傷臟或致腸痛而夜啼只以兒之手掌長短為度千金論云須令足趺上為度總之以衣尺五寸斷臍則可矣米牙除驚風之原附板牙頂珠凡兒生下每日夜將苦茶蘸軟絹攪兒口內如齒邊有白點即米牙也即用細銀針挑破用上京墨汁塗之永無驚風嘬口之病有牙床緊硬者名板牙亦須挑破亦有喉間腫突者名曰頂珠須以手指蘸冰片擦之其突自下一方以雞子清磨銀子水令兒吮二三匙即愈板牙治同米牙米牙挑破後用殭蠶一條燒存性研硃砂末少許麝香少許同研擦挑處無嘬口驚風噤口之病臍風嘬口亦可用臍風張煥云嬰兒斷臍帶後宜用厚軟布裹護若乳母不慎或因浴而水入或兒尿繃中未換為濕氣所浸或當風解視七日內遂成此疾令兒臍腫多啼不能乳哺即成臍風也用真白殭蠶四條炒去絲嘴為末蜜調抹唇內即愈嘬口嘬口之症必先大便熱須用生犀角及真羚羊角研汁和蜜調飲之有效急則用大黃二錢甘草二錢水煎服效甚哺乳法乳者你也哺者食也乳後不得與食哺後不得與乳蓋乳食相併難以克化大則成癖小則成積疳氣自此始矣保生要云小兒多睡勿強於乳守此法者幼則頗實長則健壯至老無陳病否則反是夜啼小兒夜啼用溏雞糞塗兒臍上極桂或男兒用雌雞糞女兒用雄雞糞此方對世俗農工人言即公雞母雞護兒法精要云初生小兒夏忌飲冷食生冬忌火炙衣被且曰要得小兒安多受飢合寒真至良言也養子真訣云吃熱莫吃冷吃軟莫吃硬吃少莫吃多真至妙之言也稀豆法綱目云臍帶干落安靜瓦上四周以木火炙之止令煙盡勿使成灰取出以磁碗扣地上良久待火毒出研極細每用一分加上辰砂五釐共研末次日以乳汁調塗乳頭上令兒食之一日內作二三次服盡勿待異日否則不效韓梅村曰上法食之永不生斑疹生亦輕矣又方小兒百日內用淨金銀花一兩甘草五錢煎湯久服即出痘亦少一方小兒始降生時搗韭根自然汁灌兒腹中二三匙則吐出胎血永免生痘一方綠豆大黃豆大黑豆各一合煎湯四時八節給兒服名曰三豆湯用之稀痘良一方蓖麻子四十九粒去殼去油硃砂二錢麝香二分共為末收磁器內每年到五月五日七月七日九月九日旦起擦兒手足心中及胸背前後心上擦三四年出痘自稀一方小兒初生用豬膽汁二三枚傾盆遍身洗之使其兒永不生瘡疥高氏胎產方案附保嬰訣終讀高氏胎產方案贅言古來有明儒不明醫者斷無明醫不明儒者何則以醫術本乎學術要非執拗成性不近人情者所克何也余師胎產方案全部分為四卷胎前三十四症臨產四症產後四十七症以及難產救治調護諸法均系經驗心得百治百效者果能家家備此一部按症用方實度人之慈航救世之活佛也范文正公云不為良相即為良醫可為余師誦之民國二十三年歲在甲戌九月既望清庠生受業李承寅學海甫沐手謹識胎產方案說胎產方案一書余先嚴為便大眾也而授之岳曰天下之人眾矣不外勞心勞力二種醫者乃救人而使之安與為民上者之官同有勞心之責且較之居官權能自操要視學力何如耳今願汝曹業農業讀務求實學學優則或官或醫不致無業斯可耳光緒戊申夏先嚴親教以刈麥並稷獲鋤等事岳為之而炎熱當午不堪其苦乃慨然曰身如在丹爐之煅煉其疲乏也如將軍戰陳之回壘自此乃學為醫永不再事勞力矣先嚴大悅遂講演而複習之民國初以胎產秘書改名為方案而示之曰吾因事親病延醫難而習其事靈素難經各科咸備臨症細揣百不一失惟胎產一科恨無專門而達生與各書之胎產又略而不備予乃集古之論與己之方擇其屢驗者而編之汝開診後經絡脈理遵靈素與嵩崖處方依金鑑調方依景岳婦科雜症遵綱目至胎產一門本此即可有同好者抄錄之多多益善惜義淺文拙不堪付梓耳且異日開診當有請即至莫使作難時時不忘安民主義即勞心君子也反是即非吾子岳即立應曰兒必盡心醫科力除眾人痛苦富貴非兒志也先嚴大悅今因素者多抄錄難岳鉛印二百部量力以濟世人以答先嚴之意如有心於此者廣為流傳當再付印以繼之岳頓首民國二十三年歲在甲戌冬十一月次男宗岳在依岱山房沐手謹識仲岱此說醫以救人為急仁也而又時時不忘乃父孝也本此心何事不成況專心一致能不成功耶書已印出效蓋有極可賀可喜梅村識民國二十三年冬十一月高淑濂胎產方案全書四冊中華民國二十三年十二月出版定價一元二角著作者泰安高淑濂校正者韓梅村李珠泉高宗岳校對者劉鑾廷高曉然高宗峻王宗海印刷者大陸書社山東泰安大關街發行者大陸書社贈胎產方案書壹百部宗族戚友一體大鑒去年在大陸書社印有胎產方案貳百部初定印時約計全書不過八十張斯後加頁一半即名人贈字贈序等文印成乃為壹百五十六張矣印費當然再加數十元然大陸經理李彼顏主持信用一言出口不再翻舌宗岳即將全價交付外留書於大陸一半任其變價以補加張頁之資並將版權送為大陸所有但本書所印太少願要者從速由大陸購買者價由大陸主持若有仁壽贈送者乃非賣品系宗岳完全奉贈恐有未知特此敬布贈書地址泰安西門裡仁壽書店自民國二十四年四月一日起贈完為止高宗岳啟
