front:
  text: 高氏胎產方案後序原名秘書且甚哉治病之難莫難於治婦人之病矣又莫難於治婦人胎前產後之病同一傷寒也若傷寒在胎前及傷寒在產後不能執一方以為治療古人有言曰胎前以清熱安胎為主產後以補氣養血為主其所得之時疫兼而治之況胎前有子懸子煩子癇子腫子氣子滿子淋子鳴等症產後有心痛腰痛腹痛頭痛發熱大渴泄瀉尿血等症既有一定之病症既有一定之方藥詳細辨明按症施治庶為良工矣源攻婦科約有三十餘年矣對於胎前產後各病苦無把握時常臨症以後雖有案而元方即有方焉而用藥又恐不底確倘魯莽施治則人命危在旦夕可不懼哉近讀淑濂先生所著胎產秘書一種論症詳明治法完備其有俾於婦人之病者良非淺顯源得藉此得闢前日之夢寐增後日之智識矣是為序時在甲戌仲冬百源氏再序於積善堂
  hash: sha256:516acb0e5c79c5a894887ed7fa738d5015234edc2f80331a69693e784480895b
